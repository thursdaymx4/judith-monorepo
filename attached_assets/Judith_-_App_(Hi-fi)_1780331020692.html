<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Judith — App (Hi-fi)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: oklch(0.74 0.16 295);
    --glow: 1;
    --canvas: #0a0b0e;
    --surface-1: #121419;
    --surface-2: #181b22;
    --surface-3: #1f232c;
    --hair: rgba(255,255,255,0.09);
    --hair-2: rgba(255,255,255,0.055);
    --txt-hi: #f3f5f8;
    --txt-mid: #a7adba;
    --txt-low: #6a7180;
    --urgent: oklch(0.7 0.19 25);
    --near: oklch(0.82 0.15 80);
    --ok: oklch(0.78 0.13 165);
    --r-lg: 24px; --r-md: 16px; --r-sm: 12px;
    --pad: 18px; --gap: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 80% at 50% -10%, color-mix(in oklab, var(--accent) 11%, transparent), transparent 60%),
      #050608;
    color: var(--txt-hi);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: grid; place-items: center;
    padding: 36px 20px; min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

  .phone { width: 390px; border-radius: 54px; padding: 11px; background: linear-gradient(160deg, #26282e, #0d0e11); box-shadow: 0 40px 90px -30px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05) inset; }
  .screen { position: relative; width: 368px; height: 800px; border-radius: 44px; background: radial-gradient(140% 50% at 50% -8%, color-mix(in oklab, var(--accent) 12%, transparent), transparent 55%), var(--canvas); overflow: hidden; display: flex; flex-direction: column; }

  .statusbar { flex: 0 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 16px 26px 6px; font-size: 14px; font-weight: 600; z-index: 5; }
  .statusbar .ico-row { display: flex; gap: 6px; align-items: center; opacity: 0.92; }
  .statusbar .bars { display: flex; gap: 2px; align-items: flex-end; height: 11px; }
  .statusbar .bars i { width: 3px; background: var(--txt-hi); border-radius: 1px; }
  .statusbar .bars i:nth-child(1){height:4px} .statusbar .bars i:nth-child(2){height:6px}
  .statusbar .bars i:nth-child(3){height:8px} .statusbar .bars i:nth-child(4){height:11px}
  .batt { width: 22px; height: 11px; border: 1.5px solid var(--txt-hi); border-radius: 3px; position: relative; opacity:.9; }
  .batt::after { content:''; position:absolute; right:-3px; top:3px; width:2px; height:5px; background:var(--txt-hi); border-radius:0 2px 2px 0; }
  .batt::before { content:''; position:absolute; inset:1.5px; right:7px; background:var(--txt-hi); border-radius:1px; }

  .tabview { flex: 1 1 auto; overflow-y: auto; position: relative; }
  .tabview::-webkit-scrollbar { width: 0; }
  .pagepad { padding: 8px 22px 28px; }
  .view-anim { animation: vIn .4s cubic-bezier(.2,.7,.3,1); }
  @keyframes vIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* tab bar */
  .tabbar { flex: 0 0 auto; display: flex; padding: 10px 14px calc(14px + env(safe-area-inset-bottom)); gap: 4px; border-top: 1px solid var(--hair-2); background: color-mix(in oklab, var(--canvas) 86%, transparent); backdrop-filter: blur(12px); z-index: 6; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; color: var(--txt-low); cursor: pointer; border: 0; background: transparent; font-family: inherit; transition: color .2s; }
  .tab.on { color: var(--accent); }
  .tab span { font-size: 10px; letter-spacing: .02em; }
  .tab .tdot { width: 0; height: 0; }

  /* headings */
  h1.h { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
  h2.h { font-size: 21px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .kicker { font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .muted { color: var(--txt-mid); }
  .low { color: var(--txt-low); }
  .section-label { font-size: 13px; color: var(--txt-mid); letter-spacing: .04em; text-transform: uppercase; margin: 18px 0 10px; }

  /* orb */
  .orb-wrap { position: relative; flex: 0 0 auto; }
  .orb-glow { position: absolute; inset: -22%; border-radius: 50%; background: radial-gradient(circle, color-mix(in oklab, var(--accent) 85%, transparent) 0%, transparent 65%); filter: blur(14px); opacity: calc(0.5 * var(--glow)); animation: breathe var(--bspeed,5.5s) ease-in-out infinite; }
  .orb-core { position: absolute; inset: 13%; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fff 0%, color-mix(in oklab, var(--accent) 60%, #fff) 17%, var(--accent) 46%, color-mix(in oklab, var(--accent) 55%, #000) 100%); box-shadow: 0 0 calc(26px * var(--glow)) color-mix(in oklab, var(--accent) 70%, transparent), inset 0 0 14px rgba(255,255,255,0.35); animation: breathe var(--bspeed,5.5s) ease-in-out infinite; }
  .orb-core::after { content:''; position:absolute; inset:0; border-radius:50%; background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.4), transparent 40%); mix-blend-mode: screen; opacity:.5; animation: spin 7s linear infinite; }
  .orb-ring { position: absolute; inset: 11%; border-radius: 50%; border: 1px solid color-mix(in oklab, var(--accent) 55%, transparent); animation: idlePulse var(--rspeed,5.5s) ease-out infinite; }
  .orb-ring.r2 { animation-delay: calc(var(--rspeed,5.5s) / 2); }
  .orb-ring.r3 { animation-delay: calc(var(--rspeed,5.5s) / 1.4); }
  .listening { --rspeed: 2.1s; --bspeed: 2.6s; }
  .speaking  { --bspeed: 1.5s; }
  .wave { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 14%; }
  .wave i { width: 7%; min-width: 4px; background: #fff; border-radius: 6px; box-shadow: 0 0 10px color-mix(in oklab, var(--accent) 80%, transparent); animation: wv .9s ease-in-out infinite; }
  .wave i:nth-child(1){animation-delay:0s} .wave i:nth-child(2){animation-delay:.12s}
  .wave i:nth-child(3){animation-delay:.24s} .wave i:nth-child(4){animation-delay:.36s}
  .wave i:nth-child(5){animation-delay:.18s} .wave i:nth-child(6){animation-delay:.06s}
  @keyframes wv { 0%,100%{ height: 16%; } 50%{ height: 62%; } }
  @keyframes breathe { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.05); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes idlePulse { 0% { transform: scale(0.85); opacity:.7; } 70%{ opacity:0; } 100%{ transform: scale(1.65); opacity:0; } }

  /* cards / rows */
  .card { border: 1px solid var(--hair); border-radius: var(--r-md); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); padding: var(--pad); }
  .ico { width: 38px; height: 38px; border-radius: 11px; border: 1px solid var(--hair); background: var(--surface-3); display: grid; place-items: center; color: var(--txt-mid); flex: 0 0 auto; }
  .bill-row { display: flex; align-items: center; gap: 13px; border: 1px solid var(--hair); border-radius: var(--r-md); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); padding: 13px 14px; cursor: pointer; transition: border-color .2s, transform .14s; }
  .bill-row:active { transform: scale(.99); }
  .bill-row.paid { opacity: 0.55; }
  .bill-row .meta { flex: 1; min-width: 0; }
  .bill-row .meta .p { font-weight: 500; }
  .bill-row .meta .d { font-size: 12px; color: var(--txt-low); display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .dot.urgent { background: var(--urgent); box-shadow: 0 0 10px var(--urgent); }
  .dot.near { background: var(--near); box-shadow: 0 0 10px var(--near); }
  .dot.ok { background: var(--ok); box-shadow: 0 0 10px var(--ok); }
  .amt { font-weight: 600; }

  .pill { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--txt-mid); background: var(--surface-2); border: 1px solid var(--hair); border-radius: 20px; padding: 6px 12px; cursor: pointer; }
  .pill b { color: var(--accent); }

  .stat-big { font-size: 40px; font-weight: 600; letter-spacing: -0.02em; }

  /* buttons */
  .btn { border: 0; cursor: pointer; font-family: 'Space Grotesk', sans-serif; border-radius: var(--r-md); padding: 15px; font-size: 16px; font-weight: 700; text-align: center; transition: transform .15s, filter .2s; width: 100%; }
  .btn:active { transform: scale(.985); }
  .btn-primary { background: var(--accent); color: #07080a; box-shadow: 0 12px 30px -12px color-mix(in oklab, var(--accent) 85%, transparent); }
  .btn-soft { background: var(--surface-2); color: var(--txt-hi); border: 1px solid var(--hair); }
  .btn-ghost { background: transparent; color: var(--txt-mid); font-weight: 500; }

  /* sheet */
  .scrim { position: absolute; inset: 0; background: rgba(3,4,6,0.6); backdrop-filter: blur(2px); z-index: 34; opacity: 0; pointer-events: none; transition: opacity .3s; }
  .scrim.show { opacity: 1; pointer-events: auto; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; z-index: 35; background: linear-gradient(180deg, var(--surface-2), var(--surface-1)); border-top: 1px solid var(--hair); border-radius: 28px 28px 0 0; padding: 12px 22px calc(22px + env(safe-area-inset-bottom)); box-shadow: 0 -30px 60px -20px rgba(0,0,0,0.8); transform: translateY(102%); transition: transform .42s cubic-bezier(.2,.8,.2,1); display: flex; flex-direction: column; gap: 14px; max-height: 88%; overflow-y: auto; }
  .sheet.show { transform: none; }
  .grab { width: 42px; height: 5px; border-radius: 3px; background: var(--surface-3); margin: 2px auto 4px; flex: 0 0 auto; }

  /* form */
  .field > label { font-size: 12px; color: var(--txt-mid); display: block; margin-bottom: 6px; }
  .control { border: 1px solid var(--hair); background: var(--surface-1); border-radius: var(--r-sm); padding: 12px 14px; font-size: 15px; display: flex; align-items: center; justify-content: space-between; color: var(--txt-hi); width: 100%; font-family: inherit; }
  .control::placeholder { color: var(--txt-low); }
  .control:focus { outline: none; border-color: color-mix(in oklab, var(--accent) 55%, transparent); }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* settings */
  .set-row { display: flex; align-items: center; gap: 13px; padding: 14px 15px; border: 1px solid var(--hair); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); }
  .set-group { border-radius: var(--r-md); overflow: hidden; display: flex; flex-direction: column; gap: 0; }
  .set-group .set-row { border-radius: 0; border-bottom: 0; }
  .set-group .set-row + .set-row { border-top: 1px solid var(--hair-2); }
  .set-row .label { flex: 1; }
  .set-row .label .t { font-weight: 500; font-size: 15px; }
  .set-row .label .s { font-size: 12px; color: var(--txt-low); margin-top: 1px; }
  .toggle { width: 46px; height: 28px; border-radius: 20px; background: var(--surface-3); border: 1px solid var(--hair); position: relative; cursor: pointer; flex: 0 0 auto; transition: background .2s; }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle .knob { position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: transform .2s; }
  .toggle.on .knob { transform: translateX(18px); }

  /* ask */
  .transcript { align-self: flex-end; max-width: 84%; background: var(--surface-3); border: 1px solid var(--hair); border-radius: 18px 18px 5px 18px; padding: 11px 14px; font-size: 14px; line-height: 1.4; }
  .judith-line { align-self: flex-start; max-width: 88%; background: color-mix(in oklab, var(--accent) 13%, var(--surface-2)); border: 1px solid color-mix(in oklab, var(--accent) 28%, transparent); border-radius: 18px 18px 18px 5px; padding: 11px 14px; font-size: 14px; line-height: 1.45; }
  .bubble-in { animation: bubbleIn .4s cubic-bezier(.2,.8,.2,1); }
  @keyframes bubbleIn { from { opacity: 0; transform: translateY(8px) scale(.97); } to { opacity: 1; transform: none; } }
  .chip { border: 1px solid var(--hair); border-radius: 22px; padding: 9px 14px; font-size: 13px; background: var(--surface-2); color: var(--txt-mid); cursor: pointer; transition: all .15s; white-space: nowrap; }
  .chip:active { transform: scale(.97); }
  .chip.sel { border-color: var(--accent); color: var(--txt-hi); background: color-mix(in oklab, var(--accent) 16%, var(--surface-2)); }
  .typing i { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin: 0 1.5px; animation: blink 1.2s infinite; }
  .typing i:nth-child(2){animation-delay:.2s} .typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink { 0%,60%,100%{opacity:.25} 30%{opacity:1} }
  .mic-btn { width: 64px; height: 64px; border-radius: 50%; border: 0; cursor: pointer; background: var(--accent); color: #07080a; display: grid; place-items: center; box-shadow: 0 0 0 7px color-mix(in oklab, var(--accent) 16%, transparent), 0 12px 30px -10px color-mix(in oklab, var(--accent) 80%, transparent); transition: transform .15s; flex: 0 0 auto; }
  .mic-btn:active { transform: scale(.93); }
  .mic-btn.live { animation: micPulse 1.4s ease-in-out infinite; }
  @keyframes micPulse { 0%,100%{ box-shadow: 0 0 0 7px color-mix(in oklab, var(--accent) 16%, transparent); } 50%{ box-shadow: 0 0 0 16px color-mix(in oklab, var(--accent) 5%, transparent); } }
  .askinput { display: flex; gap: 10px; align-items: center; }
  .askinput input { flex: 1; }

  .fab { position: absolute; right: 18px; bottom: 16px; width: 56px; height: 56px; border-radius: 50%; border: 0; background: var(--accent); color: #07080a; display: grid; place-items: center; box-shadow: 0 12px 30px -8px color-mix(in oklab, var(--accent) 85%, transparent); cursor: pointer; z-index: 7; }
  .fab:active { transform: scale(.93); }

  .homebar { position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%); width: 130px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.28); z-index: 30; pointer-events: none; }
  body.reduce-motion *, body.reduce-motion *::after, body.reduce-motion *::before { animation: none !important; }
  .caption { margin-top: 20px; text-align: center; color: var(--txt-low); font-size: 13px; }
  .caption b { color: var(--txt-mid); font-weight: 500; }

  /* ---------- light theme ---------- */
  body[data-theme="light"] {
    --canvas: #f1f2f6;
    --surface-1: #ffffff;
    --surface-2: #fbfbfe;
    --surface-3: #eceef4;
    --hair: rgba(16,18,28,0.10);
    --hair-2: rgba(16,18,28,0.06);
    --txt-hi: #14161d;
    --txt-mid: #545b6b;
    --txt-low: #888fa0;
    background:
      radial-gradient(120% 80% at 50% -10%, color-mix(in oklab, var(--accent) 12%, transparent), transparent 60%),
      #e6e8ef;
  }
  body[data-theme="light"] .screen { background: radial-gradient(140% 50% at 50% -8%, color-mix(in oklab, var(--accent) 14%, transparent), transparent 55%), var(--canvas); }
  body[data-theme="light"] .phone { background: linear-gradient(160deg, #d3d6df, #b6bac6); }
  body[data-theme="light"] .homebar { background: rgba(20,22,29,0.25); }
  body[data-theme="light"] .btn-primary { color: #fff; }
  body[data-theme="light"] .logo-cat { background: var(--surface-3); }
  body[data-theme="light"] .toast-shadow { box-shadow: 0 14px 34px -12px rgba(20,22,30,.25); }

  /* ---------- provider logo tiles ---------- */
  .logo-tile { flex: 0 0 auto; display: grid; place-items: center; color: #fff; font-weight: 700; font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14); line-height: 1; }
  .logo-tile.logo-cat { box-shadow: inset 0 0 0 1px var(--hair); }

  /* ---------- segmented control ---------- */
  .seg-ctl { display: inline-flex; background: var(--surface-2); border: 1px solid var(--hair); border-radius: 11px; padding: 3px; gap: 2px; }
  .seg-ctl.wide { display: flex; width: 100%; }
  .seg-ctl button { flex: 1; border: 0; background: transparent; color: var(--txt-mid); font-family: inherit; font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: background .2s, color .2s; }
  .seg-ctl button.on { background: var(--accent); color: #07080a; }
  body[data-theme="light"] .seg-ctl button.on { color: #fff; }

  /* ---------- KPI / charts ---------- */
  .card.kpi { padding: 14px 15px; display: flex; flex-direction: column; gap: 2px; }
  .trend-bar { transition: height .5s cubic-bezier(.2,.7,.3,1); }

  /* ---------- round buttons ---------- */
  .round-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--hair); background: var(--surface-2); display: grid; place-items: center; color: var(--txt-mid); cursor: pointer; flex: 0 0 auto; }
  .round-btn.lg { width: 48px; height: 48px; }
  .round-btn:active { transform: scale(.92); }

  /* ---------- fab stack ---------- */
  .fab-stack { position: absolute; right: 18px; bottom: 80px; display: flex; flex-direction: column; gap: 12px; z-index: 7; align-items: center; }
  .fab-stack .fab { position: static; }
  .fab-scan { width: 48px; height: 48px; background: var(--surface-2); color: var(--accent); border: 1px solid color-mix(in oklab, var(--accent) 40%, var(--hair)); box-shadow: 0 8px 22px -10px rgba(0,0,0,.6); }

  /* ---------- provider suggestion chips ---------- */
  .prov-chip { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--hair); border-radius: 22px; padding: 5px 12px 5px 5px; background: var(--surface-2); color: var(--txt-hi); font-family: inherit; font-size: 13px; cursor: pointer; white-space: nowrap; transition: border-color .15s, background .15s; }
  .prov-chip.sel { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 14%, var(--surface-2)); }
  .prov-chip:active { transform: scale(.97); }

  .detected-banner { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ok); background: color-mix(in oklab, var(--ok) 12%, transparent); border: 1px solid color-mix(in oklab, var(--ok) 35%, transparent); border-radius: 11px; padding: 9px 12px; }

  /* ---------- scan viewfinder ---------- */
  .scan-frame { position: relative; border-radius: 18px; background: radial-gradient(120% 90% at 50% 0, color-mix(in oklab, var(--accent) 10%, var(--surface-1)), var(--surface-1)); border: 1px solid var(--hair); height: 250px; overflow: hidden; display: grid; place-items: center; }
  .scan-doc { width: 62%; background: var(--surface-3); border-radius: 8px; padding: 18px 16px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 12px 30px -12px rgba(0,0,0,.5); transform: rotate(-2deg); }
  .scan-line-row { height: 7px; border-radius: 4px; background: color-mix(in oklab, var(--txt-low) 40%, transparent); }
  .scan-amt { font-size: 18px; font-weight: 700; color: var(--txt-mid); margin: 2px 0; }
  .scan-corner { position: absolute; width: 26px; height: 26px; border: 2.5px solid var(--accent); }
  .scan-corner.tl { top: 16px; left: 16px; border-right: 0; border-bottom: 0; border-radius: 8px 0 0 0; }
  .scan-corner.tr { top: 16px; right: 16px; border-left: 0; border-bottom: 0; border-radius: 0 8px 0 0; }
  .scan-corner.bl { bottom: 16px; left: 16px; border-right: 0; border-top: 0; border-radius: 0 0 0 8px; }
  .scan-corner.br { bottom: 16px; right: 16px; border-left: 0; border-top: 0; border-radius: 0 0 8px 0; }
  .scan-sweep { position: absolute; left: 8%; right: 8%; height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent); box-shadow: 0 0 18px 3px color-mix(in oklab, var(--accent) 70%, transparent); border-radius: 3px; animation: sweep 1.9s ease-in-out infinite; }
  @keyframes sweep { 0%{ top: 14%; } 50%{ top: 84%; } 100%{ top: 14%; } }
  .scan-check { position: absolute; inset: 0; display: grid; place-items: center; background: color-mix(in oklab, var(--ok) 20%, transparent); color: var(--ok); animation: vIn .3s ease; }

  .shutter { width: 64px; height: 64px; border-radius: 50%; border: 0; background: transparent; box-shadow: inset 0 0 0 4px var(--accent); display: grid; place-items: center; cursor: pointer; padding: 0; }
  .shutter span { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); display: block; transition: transform .15s; }
  .shutter:active span { transform: scale(.88); }
  .shutter.busy span { animation: shutPulse 1s ease-in-out infinite; }
  @keyframes shutPulse { 0%,100%{ transform: scale(1); opacity: 1; } 50%{ transform: scale(.8); opacity: .6; } }

  /* ---------- appearance theme switch ---------- */
  .theme-switch { display: flex; gap: 10px; }
  .theme-switch button { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 9px; padding: 16px; border-radius: var(--r-md); border: 1px solid var(--hair); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); color: var(--txt-mid); font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: border-color .2s, color .2s, box-shadow .25s; }
  .theme-switch button.on { border-color: var(--accent); color: var(--txt-hi); box-shadow: 0 0 0 1px var(--accent), 0 10px 28px -14px color-mix(in oklab, var(--accent) 80%, transparent); }

  /* ---------- orb launcher + ask overlay ---------- */
  .orb-fab { position: absolute; right: 16px; bottom: 80px; width: 56px; height: 56px; border: 0; background: transparent; padding: 0; cursor: pointer; z-index: 12; display: grid; place-items: center; filter: drop-shadow(0 10px 20px color-mix(in oklab, var(--accent) 55%, transparent)); }
  .orb-fab:active { transform: scale(.92); }
  .ask-overlay { position: absolute; inset: 0; z-index: 22; background: radial-gradient(140% 60% at 50% -8%, color-mix(in oklab, var(--accent) 16%, transparent), transparent 55%), var(--canvas); opacity: 0; pointer-events: none; transform: translateY(14px); transition: opacity .3s ease, transform .35s cubic-bezier(.2,.8,.2,1); }
  .ask-overlay.show { opacity: 1; pointer-events: auto; transform: none; }

  /* ---------- Judith avatar (replaces orb) ---------- */
  .javatar { position: relative; display: inline-grid; place-items: center; flex: 0 0 auto; }
  .javatar-disc { position: relative; width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: radial-gradient(circle at 36% 26%, color-mix(in oklab, var(--pg1) 92%, #fff), var(--pg1) 40%, var(--pg2) 100%); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18), inset 0 -8px 18px rgba(0,0,0,0.22); z-index: 1; }
  .javatar-fig { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .javatar-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .javatar-halo { position: absolute; inset: -16%; border-radius: 50%; background: radial-gradient(circle, color-mix(in oklab, var(--pg1) 80%, transparent), transparent 66%); filter: blur(8px); opacity: calc(0.55 * var(--glow, 1)); z-index: 0; animation: breathe 5.5s ease-in-out infinite; }
  .javatar.speaking .javatar-halo { animation-duration: 1.6s; }
  .javatar-disc { z-index: 1; }
  .javatar-pulse { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid color-mix(in oklab, var(--pg1) 70%, transparent); z-index: 0; animation: idlePulse 2.1s ease-out infinite; }
  .javatar-pulse.p2 { animation-delay: 1.05s; }
  .javatar-wave { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); display: flex; align-items: flex-end; gap: 13%; height: 26%; width: 52%; z-index: 2; }
  .javatar-wave i { flex: 1; background: #fff; border-radius: 4px; box-shadow: 0 0 8px color-mix(in oklab, var(--pg1) 80%, transparent); animation: wv .85s ease-in-out infinite; }
  .javatar-wave i:nth-child(2){animation-delay:.12s} .javatar-wave i:nth-child(3){animation-delay:.24s}
  .javatar-wave i:nth-child(4){animation-delay:.36s} .javatar-wave i:nth-child(5){animation-delay:.18s}
  .javatar-badge { position: absolute; right: -2px; bottom: -2px; width: 38%; height: 38%; min-width: 18px; min-height: 18px; border-radius: 50%; background: var(--accent); color: #07080a; display: grid; place-items: center; box-shadow: 0 0 0 2.5px var(--canvas); z-index: 3; }

  .avatar-fab { position: absolute; right: 16px; bottom: 80px; width: 58px; height: 58px; border: 0; background: transparent; padding: 0; cursor: pointer; z-index: 12; display: grid; place-items: center; filter: drop-shadow(0 12px 22px color-mix(in oklab, var(--accent) 50%, transparent)); }
  .avatar-fab:active { transform: scale(.92); }

  .judith-msg { display: flex; align-items: flex-end; gap: 8px; align-self: flex-start; max-width: 90%; }

  /* ---------- bills-list overlay (See all) ---------- */
  .sheet-screen { position: absolute; inset: 0; z-index: 20; background: var(--canvas); display: flex; flex-direction: column; transform: translateX(100%); transition: transform .34s cubic-bezier(.2,.8,.2,1); }
  .sheet-screen.show { transform: none; }
  .bl-screen { display: flex; flex-direction: column; height: 100%; }
  .bl-head { display: flex; align-items: center; gap: 12px; padding: 14px 20px 10px; }
  .bl-filters { padding: 4px 20px 10px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid var(--hair-2); }
  .bl-filter-row { display: flex; align-items: center; gap: 10px; }
  .bl-flabel { font-size: 11px; color: var(--txt-low); text-transform: uppercase; letter-spacing: .05em; width: 64px; flex: 0 0 auto; }
  .bl-chips { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; }
  .bl-chips::-webkit-scrollbar { height: 0; }
  .bl-chips .chip { flex: 0 0 auto; padding: 7px 12px; font-size: 13px; }
  .bl-list { flex: 1; overflow-y: auto; padding: 14px 20px 28px; display: flex; flex-direction: column; gap: 9px; }
  .bl-list::-webkit-scrollbar { width: 0; }

  /* ---------- calendar ---------- */
  .cal-summary { display: flex; align-items: center; justify-content: space-between; }
  .cal-legend { display: flex; gap: 12px; font-size: 11px; color: var(--txt-mid); }
  .cal-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-dow { margin-bottom: 7px; }
  .cal-dowcell { text-align: center; font-size: 10px; }
  .cal-cell { position: relative; aspect-ratio: 1 / 1.18; border: 1px solid transparent; border-radius: 10px; background: transparent; color: var(--txt-mid); display: flex; flex-direction: column; align-items: center; padding: 4px 0 0; cursor: default; font-family: inherit; overflow: hidden; }
  .cal-cell.has { background: var(--surface-2); border-color: var(--hair-2); cursor: pointer; color: var(--txt-hi); }
  .cal-cell.has::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--cc, var(--accent)); }
  .cal-cell.today { box-shadow: inset 0 0 0 1.5px var(--accent); }
  .cal-cell.sel { background: color-mix(in oklab, var(--accent) 20%, var(--surface-2)); border-color: var(--accent); }
  .cal-num { font-size: 11px; line-height: 1.3; }
  .cal-cell.today .cal-num { color: var(--accent); font-weight: 700; }
  .cal-mark { display: flex; align-items: center; gap: 1px; margin-top: 1px; }
  .cal-more { font-size: 8px; color: var(--txt-low); }
  .cal-amt { font-size: 8.5px; color: var(--txt-mid); margin-top: auto; margin-bottom: 3px; }
  .cal-paiddot { color: var(--ok); margin-top: 2px; opacity: .8; }
  .cal-daychip { width: 40px; flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; background: var(--surface-3); padding: 5px 0; }
  .cal-daychip-d { font-size: 16px; font-weight: 600; line-height: 1; }
  .cal-daychip-m { font-size: 9px; color: var(--txt-low); text-transform: uppercase; letter-spacing: .04em; }
