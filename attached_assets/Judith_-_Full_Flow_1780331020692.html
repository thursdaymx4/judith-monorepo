<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Judith — Full Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,600;1,800&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: oklch(0.74 0.16 295);
    --glow: 1;
    --canvas: #0a0b0e;
    --surface-1: #121419;
    --surface-2: #181b22;
    --surface-3: #1f232c;
    --hair: rgba(255,255,255,0.09);
    --hair-2: rgba(255,255,255,0.055);
    --txt-hi: #f3f5f8;
    --txt-mid: #a7adba;
    --txt-low: #6a7180;
    --urgent: oklch(0.7 0.19 25);
    --near: oklch(0.82 0.15 80);
    --ok: oklch(0.78 0.13 165);
    --r-lg: 24px; --r-md: 16px; --r-sm: 12px;
    --pad: 18px; --gap: 12px;
  }
  body[data-density="compact"] { --pad: 13px; --gap: 9px; }
  body[data-density="comfy"]  { --pad: 22px; --gap: 15px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 80% at 50% -10%, color-mix(in oklab, var(--accent) 11%, transparent), transparent 60%),
      radial-gradient(100% 70% at 50% 120%, rgba(255,255,255,0.03), transparent 55%),
      #050608;
    color: var(--txt-hi);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: grid; place-items: center;
    padding: 36px 20px; min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

  /* ---------- device ---------- */
  .phone {
    width: 390px; border-radius: 54px; padding: 11px;
    background: linear-gradient(160deg, #26282e, #0d0e11);
    box-shadow: 0 40px 90px -30px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05) inset;
  }
  .screen {
    position: relative; width: 368px; height: 800px; border-radius: 44px;
    background: radial-gradient(140% 55% at 50% -8%, color-mix(in oklab, var(--accent) 13%, transparent), transparent 55%), var(--canvas);
    overflow: hidden; display: flex; flex-direction: column; color: var(--txt-hi);
  }

  .statusbar { flex: 0 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 16px 26px 6px; font-size: 14px; font-weight: 600; z-index: 5; }
  .statusbar .ico-row { display: flex; gap: 6px; align-items: center; opacity: 0.92; }
  .statusbar .bars { display: flex; gap: 2px; align-items: flex-end; height: 11px; }
  .statusbar .bars i { width: 3px; background: var(--txt-hi); border-radius: 1px; }
  .statusbar .bars i:nth-child(1){height:4px} .statusbar .bars i:nth-child(2){height:6px}
  .statusbar .bars i:nth-child(3){height:8px} .statusbar .bars i:nth-child(4){height:11px}
  .batt { width: 22px; height: 11px; border: 1.5px solid var(--txt-hi); border-radius: 3px; position: relative; opacity:.9; }
  .batt::after { content:''; position:absolute; right:-3px; top:3px; width:2px; height:5px; background:var(--txt-hi); border-radius:0 2px 2px 0; }
  .batt::before { content:''; position:absolute; inset:1.5px; right:7px; background:var(--txt-hi); border-radius:1px; }

  .nav { flex: 0 0 auto; display: flex; align-items: center; gap: 12px; padding: 6px 22px 2px; min-height: 42px; z-index: 5; }
  .iconbtn { width: 34px; height: 34px; flex:0 0 auto; border-radius: 50%; border: 1px solid var(--hair); background: var(--surface-2); display: grid; place-items: center; font-size: 17px; color: var(--txt-mid); cursor: pointer; user-select: none; }
  .iconbtn:active { transform: scale(.94); }
  .progress { flex: 1; display: flex; gap: 6px; }
  .progress i { height: 4px; flex: 1; border-radius: 4px; background: var(--surface-3); transition: background .3s; }
  .progress i.done { background: var(--txt-low); }
  .progress i.now { background: var(--accent); box-shadow: 0 0 12px color-mix(in oklab, var(--accent) 70%, transparent); }
  .skip { font-size: 14px; color: var(--txt-low); cursor: pointer; }

  /* ---------- generic scroll body ---------- */
  .scroll { flex: 1 1 auto; overflow-y: auto; padding: 14px 22px 26px; }
  .scroll.center { display: flex; flex-direction: column; justify-content: center; }
  .scroll::-webkit-scrollbar { width: 0; }
  .pad { padding: 0 22px; }

  .screen-anim { animation: scrIn .45s cubic-bezier(.2,.7,.3,1); }
  @keyframes scrIn { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: none; } }

  /* ---------- type ---------- */
  .kicker { font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
  h1.title { font-size: 27px; font-weight: 600; line-height: 1.1; letter-spacing: -0.015em; margin: 0; text-wrap: balance; }
  h2.title { font-size: 22px; font-weight: 600; line-height: 1.12; letter-spacing: -0.01em; margin: 0; }
  .lede { font-size: 15px; color: var(--txt-mid); line-height: 1.4; margin-top: 10px; text-wrap: pretty; }

  /* ---------- orb ---------- */
  .orb-wrap { position: relative; flex: 0 0 auto; }
  .orb-glow { position: absolute; inset: -22%; border-radius: 50%; background: radial-gradient(circle, color-mix(in oklab, var(--accent) 85%, transparent) 0%, transparent 65%); filter: blur(14px); opacity: calc(0.5 * var(--glow)); animation: breathe var(--bspeed,5.5s) ease-in-out infinite; }
  .orb-core { position: absolute; inset: 13%; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff 0%, color-mix(in oklab, var(--accent) 60%, #fff) 17%, var(--accent) 46%, color-mix(in oklab, var(--accent) 55%, #000) 100%);
    box-shadow: 0 0 calc(26px * var(--glow)) color-mix(in oklab, var(--accent) 70%, transparent), inset 0 0 14px rgba(255,255,255,0.35);
    animation: breathe var(--bspeed,5.5s) ease-in-out infinite; }
  .orb-core::after { content:''; position:absolute; inset:0; border-radius:50%; background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.4), transparent 40%); mix-blend-mode: screen; opacity:.5; animation: spin 7s linear infinite; }
  .orb-ring { position: absolute; inset: 11%; border-radius: 50%; border: 1px solid color-mix(in oklab, var(--accent) 55%, transparent); animation: idlePulse var(--rspeed,5.5s) ease-out infinite; }
  .orb-ring.r2 { animation-delay: calc(var(--rspeed,5.5s) / 2); }
  .orb-ring.r3 { animation-delay: calc(var(--rspeed,5.5s) / 1.4); }
  .listening { --rspeed: 2.1s; --bspeed: 2.6s; }
  .speaking  { --bspeed: 1.5s; }
  .wave { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 14%; }
  .wave i { width: 7%; min-width: 4px; background: #fff; border-radius: 6px; box-shadow: 0 0 10px color-mix(in oklab, var(--accent) 80%, transparent); animation: wv .9s ease-in-out infinite; }
  .wave i:nth-child(1){animation-delay:0s} .wave i:nth-child(2){animation-delay:.12s}
  .wave i:nth-child(3){animation-delay:.24s} .wave i:nth-child(4){animation-delay:.36s}
  .wave i:nth-child(5){animation-delay:.18s} .wave i:nth-child(6){animation-delay:.06s}
  @keyframes wv { 0%,100%{ height: 16%; } 50%{ height: 62%; } }
  @keyframes breathe { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.05); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes idlePulse { 0% { transform: scale(0.85); opacity:.7; } 70%{ opacity:0; } 100%{ transform: scale(1.65); opacity:0; } }

  /* ---------- buttons ---------- */
  .cta-bar { flex: 0 0 auto; padding: 12px 22px calc(20px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 9px; background: linear-gradient(to top, var(--canvas) 65%, transparent); z-index: 4; }
  .btn { border: 0; cursor: pointer; font-family: 'Space Grotesk', sans-serif; border-radius: var(--r-md); padding: 16px; font-size: 16px; font-weight: 700; text-align: center; transition: transform .15s ease, filter .2s; }
  .btn:active { transform: scale(.985); }
  .btn-primary { background: var(--accent); color: #07080a; box-shadow: 0 12px 34px -12px color-mix(in oklab, var(--accent) 85%, transparent); }
  .btn-primary:active { filter: brightness(1.06); }
  .btn-ghost { background: transparent; color: var(--txt-mid); font-weight: 500; padding: 11px; }
  .btn-soft { background: var(--surface-2); color: var(--txt-hi); border: 1px solid var(--hair); }

  /* ---------- cards / chips ---------- */
  .card { border: 1px solid var(--hair); border-radius: var(--r-md); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); padding: var(--pad); }
  .row-card { display: flex; align-items: center; gap: 13px; border: 1px solid var(--hair); border-radius: var(--r-md); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); padding: 14px 15px; cursor: pointer; transition: border-color .2s, background .2s, transform .15s; }
  .row-card:active { transform: scale(.99); }
  .row-card.sel { border-color: color-mix(in oklab, var(--accent) 60%, transparent); background: radial-gradient(120% 100% at 0 0, color-mix(in oklab, var(--accent) 14%, transparent), transparent 60%), var(--surface-2); box-shadow: 0 0 0 1px color-mix(in oklab, var(--accent) 35%, transparent); }
  .ico { width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--hair); background: var(--surface-3); display: grid; place-items: center; color: var(--txt-mid); flex: 0 0 auto; }
  .row-card.sel .ico { color: var(--accent); }
  .check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--hair); flex: 0 0 auto; display: grid; place-items: center; color: #07080a; font-size: 13px; }
  .row-card.sel .check { background: var(--accent); border-color: var(--accent); }

  .chip { border: 1px solid var(--hair); border-radius: 22px; padding: 9px 15px; font-size: 14px; background: var(--surface-2); color: var(--txt-mid); cursor: pointer; transition: all .18s; }
  .chip.sel { border-color: var(--accent); color: var(--txt-hi); background: color-mix(in oklab, var(--accent) 16%, var(--surface-2)); }

  .flag { font-size: 26px; line-height: 1; width: 38px; height: 38px; display: grid; place-items: center; border-radius: 10px; background: var(--surface-3); border: 1px solid var(--hair); flex: 0 0 auto; }

  .field > label { font-size: 12px; color: var(--txt-mid); display: block; margin-bottom: 6px; }
  .control { border: 1px solid var(--hair); background: var(--surface-1); border-radius: var(--r-sm); padding: 12px 14px; font-size: 15px; display: flex; align-items: center; justify-content: space-between; color: var(--txt-hi); }
  .control.placeholder { color: var(--txt-low); }
  .search { width: 100%; border: 1px solid var(--hair); background: var(--surface-1); border-radius: 14px; padding: 12px 14px; color: var(--txt-hi); font-family: inherit; font-size: 15px; }
  .search::placeholder { color: var(--txt-low); }
  .search:focus { outline: none; border-color: color-mix(in oklab, var(--accent) 55%, transparent); }
  select.search { -webkit-appearance: none; appearance: none; cursor: pointer; background-image: linear-gradient(45deg, transparent 50%, var(--txt-low) 50%), linear-gradient(135deg, var(--txt-low) 50%, transparent 50%); background-position: calc(100% - 16px) center, calc(100% - 11px) center; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 30px; }

  /* ---------- voice flow ---------- */
  .transcript { align-self: flex-end; max-width: 84%; background: var(--surface-3); border: 1px solid var(--hair); border-radius: 18px 18px 5px 18px; padding: 12px 15px; font-size: 15px; line-height: 1.35; }
  .judith-line { align-self: flex-start; max-width: 88%; background: color-mix(in oklab, var(--accent) 14%, var(--surface-2)); border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent); border-radius: 18px 18px 18px 5px; padding: 12px 15px; font-size: 15px; line-height: 1.35; }
  .bubble-in { animation: bubbleIn .4s cubic-bezier(.2,.8,.2,1); }
  @keyframes bubbleIn { from { opacity: 0; transform: translateY(8px) scale(.97); } to { opacity: 1; transform: none; } }
  .heard { color: var(--accent); font-weight: 600; background: color-mix(in oklab, var(--accent) 18%, transparent); border-radius: 5px; padding: 0 3px; }
  .parsed { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .parsed .pcell { border: 1px solid var(--hair); border-radius: 12px; padding: 11px 13px; background: var(--surface-1); animation: rise .5s cubic-bezier(.2,.7,.3,1) backwards; }
  .parsed .pcell .pl { font-size: 11px; color: var(--txt-low); letter-spacing: .04em; text-transform: uppercase; }
  .parsed .pcell .pv { font-size: 17px; font-weight: 600; margin-top: 3px; }
  .parsed .pcell.full { grid-column: 1 / -1; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .mic-btn { width: 76px; height: 76px; border-radius: 50%; border: 0; cursor: pointer; align-self: center; background: var(--accent); color: #07080a; display: grid; place-items: center; box-shadow: 0 0 0 8px color-mix(in oklab, var(--accent) 18%, transparent), 0 14px 36px -10px color-mix(in oklab, var(--accent) 80%, transparent); transition: transform .15s; }
  .mic-btn:active { transform: scale(.93); }
  .mic-btn.live { animation: micPulse 1.4s ease-in-out infinite; }
  @keyframes micPulse { 0%,100%{ box-shadow: 0 0 0 8px color-mix(in oklab, var(--accent) 18%, transparent); } 50%{ box-shadow: 0 0 0 18px color-mix(in oklab, var(--accent) 6%, transparent); } }

  .stack-pill { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--txt-mid); background: var(--surface-2); border: 1px solid var(--hair); border-radius: 20px; padding: 6px 12px; }
  .stack-pill b { color: var(--accent); }

  /* ---------- summary / chart ---------- */
  .stat-big { font-size: 40px; font-weight: 600; letter-spacing: -0.02em; }
  .chart { display: flex; align-items: flex-end; gap: 10px; height: 130px; padding-top: 10px; }
  .chart .bar { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; gap: 7px; height: 100%; }
  .chart .bar .fill { width: 100%; border-radius: 7px 7px 3px 3px; background: linear-gradient(to top, color-mix(in oklab, var(--accent) 40%, var(--surface-3)), var(--accent)); animation: grow .8s cubic-bezier(.2,.8,.2,1) backwards; }
  @keyframes grow { from { height: 0 !important; } }
  .chart .bar .bl { font-size: 10px; color: var(--txt-low); }
  .chart .bar .bv { font-size: 9.5px; font-weight: 600; color: var(--txt-mid); }
  .insight { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border: 1px solid var(--hair); border-radius: 14px; background: var(--surface-1); }
  .insight .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  .dot.urgent { background: var(--urgent); box-shadow: 0 0 10px var(--urgent); }
  .dot.near { background: var(--near); box-shadow: 0 0 10px var(--near); }
  .dot.ok { background: var(--ok); box-shadow: 0 0 10px var(--ok); }

  /* ---------- feature mocks ---------- */
  .mock-notif { border: 1px solid var(--hair); border-radius: 18px; background: rgba(28,31,38,0.9); backdrop-filter: blur(6px); padding: 13px 15px; display: flex; gap: 12px; align-items: flex-start; box-shadow: 0 16px 40px -18px rgba(0,0,0,.8); }
  .mock-widget { border: 1px solid var(--hair); border-radius: 22px; background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); padding: 18px; aspect-ratio: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .watch { width: 150px; height: 180px; border-radius: 44px; background: #000; border: 6px solid #1c1f26; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 20px 50px -20px rgba(0,0,0,.9); }

  /* ---------- pricing ---------- */
  .price-card { border: 1px solid color-mix(in oklab, var(--accent) 35%, transparent); border-radius: var(--r-lg); background: radial-gradient(130% 80% at 50% 0, color-mix(in oklab, var(--accent) 16%, transparent), transparent 60%), var(--surface-1); padding: 20px; }
  .feat-line { display: flex; gap: 11px; align-items: flex-start; font-size: 14px; color: var(--txt-mid); padding: 7px 0; }
  .feat-line .tick { color: var(--accent); flex: 0 0 auto; margin-top: 1px; }

  .homebar { position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%); width: 130px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.28); z-index: 6; }

  .dots { display: flex; gap: 7px; justify-content: center; }
  .dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--surface-3); }
  .dots i.on { background: var(--accent); width: 20px; border-radius: 4px; }

  body.reduce-motion *, body.reduce-motion *::after, body.reduce-motion *::before { animation: none !important; }

  .caption { margin-top: 20px; text-align: center; color: var(--txt-low); font-size: 13px; }
  .caption b { color: var(--txt-mid); font-weight: 500; }

  .orb-wrap { position: relative; flex: 0 0 auto; }
  .orb-glow { position: absolute; inset: -22%; border-radius: 50%; background: radial-gradient(circle, color-mix(in oklab, var(--accent) 85%, transparent) 0%, transparent 65%); filter: blur(14px); opacity: calc(0.5 * var(--glow)); animation: breathe var(--bspeed,5.5s) ease-in-out infinite; }
  .orb-core { position: absolute; inset: 13%; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fff 0%, color-mix(in oklab, var(--accent) 60%, #fff) 17%, var(--accent) 46%, color-mix(in oklab, var(--accent) 55%, #000) 100%); box-shadow: 0 0 calc(26px * var(--glow)) color-mix(in oklab, var(--accent) 70%, transparent), inset 0 0 14px rgba(255,255,255,0.35); animation: breathe var(--bspeed,5.5s) ease-in-out infinite; }
  .orb-core::after { content:''; position:absolute; inset:0; border-radius:50%; background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.4), transparent 40%); mix-blend-mode: screen; opacity:.5; animation: spin 7s linear infinite; }
  .orb-ring { position: absolute; inset: 11%; border-radius: 50%; border: 1px solid color-mix(in oklab, var(--accent) 55%, transparent); animation: idlePulse var(--rspeed,5.5s) ease-out infinite; }
  .orb-ring.r2 { animation-delay: calc(var(--rspeed,5.5s) / 2); }
  .orb-ring.r3 { animation-delay: calc(var(--rspeed,5.5s) / 1.4); }
  .listening { --rspeed: 2.1s; --bspeed: 2.6s; }
  .speaking  { --bspeed: 1.5s; }
  .wave { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 14%; }
  .wave i { width: 7%; min-width: 4px; background: #fff; border-radius: 6px; box-shadow: 0 0 10px color-mix(in oklab, var(--accent) 80%, transparent); animation: wv .9s ease-in-out infinite; }
  .wave i:nth-child(1){animation-delay:0s} .wave i:nth-child(2){animation-delay:.12s}
  .wave i:nth-child(3){animation-delay:.24s} .wave i:nth-child(4){animation-delay:.36s}
  .wave i:nth-child(5){animation-delay:.18s} .wave i:nth-child(6){animation-delay:.06s}
  @keyframes wv { 0%,100%{ height: 16%; } 50%{ height: 62%; } }
  @keyframes breathe { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.05); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes idlePulse { 0% { transform: scale(0.85); opacity:.7; } 70%{ opacity:0; } 100%{ transform: scale(1.65); opacity:0; } }

  /* cards / rows */
  .card { border: 1px solid var(--hair); border-radius: var(--r-md); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); padding: var(--pad); }
  .ico { width: 38px; height: 38px; border-radius: 11px; border: 1px solid var(--hair); background: var(--surface-3); display: grid; place-items: center; color: var(--txt-mid); flex: 0 0 auto; }
  .bill-row { display: flex; align-items: center; gap: 13px; border: 1px solid var(--hair); border-radius: var(--r-md); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); padding: 13px 14px; cursor: pointer; transition: border-color .2s, transform .14s; }
  .bill-row:active { transform: scale(.99); }
  .bill-row.paid { opacity: 0.55; }
  .bill-row .meta { flex: 1; min-width: 0; }
  .bill-row .meta .p { font-weight: 500; }
  .bill-row .meta .d { font-size: 12px; color: var(--txt-low); display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .dot.urgent { background: var(--urgent); box-shadow: 0 0 10px var(--urgent); }
  .dot.near { background: var(--near); box-shadow: 0 0 10px var(--near); }
  .dot.ok { background: var(--ok); box-shadow: 0 0 10px var(--ok); }
  .amt { font-weight: 600; }

  .pill { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--txt-mid); background: var(--surface-2); border: 1px solid var(--hair); border-radius: 20px; padding: 6px 12px; cursor: pointer; }
  .pill b { color: var(--accent); }

  .stat-big { font-size: 40px; font-weight: 600; letter-spacing: -0.02em; }

  /* buttons */
  .btn { border: 0; cursor: pointer; font-family: 'Space Grotesk', sans-serif; border-radius: var(--r-md); padding: 15px; font-size: 16px; font-weight: 700; text-align: center; transition: transform .15s, filter .2s; width: 100%; }
  .btn:active { transform: scale(.985); }
  .btn-primary { background: var(--accent); color: #07080a; box-shadow: 0 12px 30px -12px color-mix(in oklab, var(--accent) 85%, transparent); }
  .btn-soft { background: var(--surface-2); color: var(--txt-hi); border: 1px solid var(--hair); }
  .btn-ghost { background: transparent; color: var(--txt-mid); font-weight: 500; }

  /* sheet */
  .scrim { position: absolute; inset: 0; background: rgba(3,4,6,0.6); backdrop-filter: blur(2px); z-index: 34; opacity: 0; pointer-events: none; transition: opacity .3s; }
  .scrim.show { opacity: 1; pointer-events: auto; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; z-index: 35; background: linear-gradient(180deg, var(--surface-2), var(--surface-1)); border-top: 1px solid var(--hair); border-radius: 28px 28px 0 0; padding: 12px 22px calc(22px + env(safe-area-inset-bottom)); box-shadow: 0 -30px 60px -20px rgba(0,0,0,0.8); transform: translateY(102%); transition: transform .42s cubic-bezier(.2,.8,.2,1); display: flex; flex-direction: column; gap: 14px; max-height: 88%; overflow-y: auto; }
  .sheet.show { transform: none; }
  .grab { width: 42px; height: 5px; border-radius: 3px; background: var(--surface-3); margin: 2px auto 4px; flex: 0 0 auto; }

  /* form */
  .field > label { font-size: 12px; color: var(--txt-mid); display: block; margin-bottom: 6px; }
  .control { border: 1px solid var(--hair); background: var(--surface-1); border-radius: var(--r-sm); padding: 12px 14px; font-size: 15px; display: flex; align-items: center; justify-content: space-between; color: var(--txt-hi); width: 100%; font-family: inherit; }
  .control::placeholder { color: var(--txt-low); }
  .control:focus { outline: none; border-color: color-mix(in oklab, var(--accent) 55%, transparent); }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* settings */
  .set-row { display: flex; align-items: center; gap: 13px; padding: 14px 15px; border: 1px solid var(--hair); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); }
  .set-group { border-radius: var(--r-md); overflow: hidden; display: flex; flex-direction: column; gap: 0; }
  .set-group .set-row { border-radius: 0; border-bottom: 0; }
  .set-group .set-row + .set-row { border-top: 1px solid var(--hair-2); }
  .set-row .label { flex: 1; }
  .set-row .label .t { font-weight: 500; font-size: 15px; }
  .set-row .label .s { font-size: 12px; color: var(--txt-low); margin-top: 1px; }
  .toggle { width: 46px; height: 28px; border-radius: 20px; background: var(--surface-3); border: 1px solid var(--hair); position: relative; cursor: pointer; flex: 0 0 auto; transition: background .2s; }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle .knob { position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: transform .2s; }
  .toggle.on .knob { transform: translateX(18px); }

  /* ask */
  .transcript { align-self: flex-end; max-width: 84%; background: var(--surface-3); border: 1px solid var(--hair); border-radius: 18px 18px 5px 18px; padding: 11px 14px; font-size: 14px; line-height: 1.4; }
  .judith-line { align-self: flex-start; max-width: 88%; background: color-mix(in oklab, var(--accent) 13%, var(--surface-2)); border: 1px solid color-mix(in oklab, var(--accent) 28%, transparent); border-radius: 18px 18px 18px 5px; padding: 11px 14px; font-size: 14px; line-height: 1.45; }
  .bubble-in { animation: bubbleIn .4s cubic-bezier(.2,.8,.2,1); }
  @keyframes bubbleIn { from { opacity: 0; transform: translateY(8px) scale(.97); } to { opacity: 1; transform: none; } }
  .chip { border: 1px solid var(--hair); border-radius: 22px; padding: 9px 14px; font-size: 13px; background: var(--surface-2); color: var(--txt-mid); cursor: pointer; transition: all .15s; white-space: nowrap; }
  .chip:active { transform: scale(.97); }
  .chip.sel { border-color: var(--accent); color: var(--txt-hi); background: color-mix(in oklab, var(--accent) 16%, var(--surface-2)); }
  .typing i { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin: 0 1.5px; animation: blink 1.2s infinite; }
  .typing i:nth-child(2){animation-delay:.2s} .typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink { 0%,60%,100%{opacity:.25} 30%{opacity:1} }
  .mic-btn { width: 64px; height: 64px; border-radius: 50%; border: 0; cursor: pointer; background: var(--accent); color: #07080a; display: grid; place-items: center; box-shadow: 0 0 0 7px color-mix(in oklab, var(--accent) 16%, transparent), 0 12px 30px -10px color-mix(in oklab, var(--accent) 80%, transparent); transition: transform .15s; flex: 0 0 auto; }
  .mic-btn:active { transform: scale(.93); }
  .mic-btn.live { animation: micPulse 1.4s ease-in-out infinite; }
  @keyframes micPulse { 0%,100%{ box-shadow: 0 0 0 7px color-mix(in oklab, var(--accent) 16%, transparent); } 50%{ box-shadow: 0 0 0 16px color-mix(in oklab, var(--accent) 5%, transparent); } }
  .askinput { display: flex; gap: 10px; align-items: center; }
  .askinput input { flex: 1; }
  .askinput input:disabled { opacity: .55; }
  .pill.warn { border-color: color-mix(in oklab, var(--near) 55%, transparent); background: color-mix(in oklab, var(--near) 12%, var(--surface-2)); }
  .pill.warn b { color: var(--near); }
  .mic-btn.locked { background: var(--surface-3); color: var(--accent); box-shadow: 0 0 0 7px color-mix(in oklab, var(--accent) 10%, transparent); }
  .ask-lock-ring { position: relative; display: inline-grid; place-items: center; }
  .ask-lock-badge { position: absolute; bottom: 2px; right: 2px; width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; background: var(--accent); color: #07080a; border: 3px solid var(--surface-1); box-shadow: 0 6px 16px -6px color-mix(in oklab, var(--accent) 80%, transparent); }
  .ask-inline-lock { margin-top: 6px; padding: 16px; border-radius: var(--r-md); text-align: center; border: 1px solid color-mix(in oklab, var(--accent) 32%, var(--hair)); background: radial-gradient(120% 90% at 50% 0, color-mix(in oklab, var(--accent) 12%, transparent), transparent 60%), var(--surface-2); }

  /* ===== reminders ===== */
  .bell-btn { position: relative; flex: 0 0 auto; width: 40px; height: 40px; margin-top: 4px; border-radius: 50%; border: 1px solid var(--hair); background: var(--surface-2); color: var(--txt-mid); display: grid; place-items: center; cursor: pointer; transition: border-color .15s, color .15s; }
  .bell-btn:hover { border-color: color-mix(in oklab, var(--accent) 50%, var(--hair)); color: var(--accent); }
  .bell-btn:active { transform: scale(.93); }
  .bell-badge { position: absolute; top: -3px; right: -3px; min-width: 18px; height: 18px; padding: 0 4px; border-radius: 9px; background: var(--urgent); color: #fff; font-size: 11px; font-weight: 700; display: grid; place-items: center; border: 2px solid var(--surface-1); }
  .lockscreen { border-radius: 22px; padding: 22px 16px 18px; background:
      radial-gradient(120% 80% at 50% -10%, color-mix(in oklab, var(--accent) 16%, transparent), transparent 60%),
      linear-gradient(170deg, #0c0e13, #16191f);
    border: 1px solid var(--hair); box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 18px 40px -22px rgba(0,0,0,.9); }
  body.light .lockscreen { background: radial-gradient(120% 80% at 50% -10%, color-mix(in oklab, var(--accent) 18%, transparent), transparent 60%), linear-gradient(170deg, #2a2f3a, #1c2027); }
  .lock-time { text-align: center; color: #fff; margin-bottom: 18px; }
  .lock-clock { font-size: 50px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
  .lock-date { font-size: 13px; opacity: .8; margin-top: 4px; }
  .lock-notif { border-radius: 17px; padding: 12px 13px; background: rgba(255,255,255,.12); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,.14); animation: lockDrop .55s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes lockDrop { from { opacity: 0; transform: translateY(-12px) scale(.97); } to { opacity: 1; transform: none; } }
  body.reduce-motion .lock-notif { animation: none !important; }
  .lock-notif-head { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
  .lock-app-ico { width: 26px; height: 26px; border-radius: 7px; overflow: hidden; flex: 0 0 auto; display: grid; place-items: center; }
  .lock-app-name { font-size: 11px; font-weight: 700; letter-spacing: .07em; color: rgba(255,255,255,.85); }
  .lock-app-time { margin-left: auto; font-size: 11px; color: rgba(255,255,255,.6); }
  .lock-notif-title { color: #fff; font-weight: 600; font-size: 15px; line-height: 1.25; }
  .lock-notif-body { color: rgba(255,255,255,.82); font-size: 13.5px; line-height: 1.35; margin-top: 3px; }
  .lock-actions { display: flex; gap: 8px; margin-top: 12px; }
  .lock-act { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 8px; border-radius: 11px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.1); color: #fff; }
  .lock-act.primary { background: var(--accent); color: #07080a; border-color: transparent; }
  .lock-act:active { transform: scale(.96); }
  .rem-grouplabel { font-size: 12px; color: var(--txt-low); font-weight: 600; margin: 12px 0 8px; }
  .rem-row { position: relative; display: flex; align-items: center; gap: 12px; padding: 11px 13px 11px 16px; border-radius: var(--r-md); background: var(--surface-2); border: 1px solid var(--hair); cursor: pointer; overflow: hidden; transition: border-color .15s; }
  .rem-row:hover { border-color: color-mix(in oklab, var(--accent) 35%, var(--hair)); }
  .rem-row:active { transform: scale(.995); }
  .rem-line { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }
  .rem-line.urgent { background: var(--urgent); } .rem-line.near { background: var(--near); } .rem-line.ok { background: var(--ok); }
  .rem-row .meta .d { display: inline-flex; align-items: center; gap: 5px; }

  .fab { position: absolute; right: 18px; bottom: 16px; width: 56px; height: 56px; border-radius: 50%; border: 0; background: var(--accent); color: #07080a; display: grid; place-items: center; box-shadow: 0 12px 30px -8px color-mix(in oklab, var(--accent) 85%, transparent); cursor: pointer; z-index: 7; }
  .fab:active { transform: scale(.93); }

  .homebar { position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%); width: 130px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.28); z-index: 30; pointer-events: none; }
  body.reduce-motion *, body.reduce-motion *::after, body.reduce-motion *::before { animation: none !important; }
  .caption { margin-top: 20px; text-align: center; color: var(--txt-low); font-size: 13px; }
  .caption b { color: var(--txt-mid); font-weight: 500; }

  /* ---------- light theme ---------- */
  body[data-theme="light"] {
    --canvas: #f1f2f6;
    --surface-1: #ffffff;
    --surface-2: #fbfbfe;
    --surface-3: #eceef4;
    --hair: rgba(16,18,28,0.10);
    --hair-2: rgba(16,18,28,0.06);
    --txt-hi: #14161d;
    --txt-mid: #545b6b;
    --txt-low: #888fa0;
    background:
      radial-gradient(120% 80% at 50% -10%, color-mix(in oklab, var(--accent) 12%, transparent), transparent 60%),
      #e6e8ef;
  }
  body[data-theme="light"] .screen { background: radial-gradient(140% 50% at 50% -8%, color-mix(in oklab, var(--accent) 14%, transparent), transparent 55%), var(--canvas); }
  body[data-theme="light"] .phone { background: linear-gradient(160deg, #d3d6df, #b6bac6); }
  body[data-theme="light"] .homebar { background: rgba(20,22,29,0.25); }
  body[data-theme="light"] .btn-primary { color: #fff; }
  body[data-theme="light"] .logo-cat { background: var(--surface-3); }
  body[data-theme="light"] .toast-shadow { box-shadow: 0 14px 34px -12px rgba(20,22,30,.25); }

  /* ---------- provider logo tiles ---------- */
  .logo-tile { flex: 0 0 auto; display: grid; place-items: center; color: #fff; font-weight: 700; font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14); line-height: 1; }
  .logo-tile.logo-cat { box-shadow: inset 0 0 0 1px var(--hair); }

  /* ---------- segmented control ---------- */
  .seg-ctl { display: inline-flex; background: var(--surface-2); border: 1px solid var(--hair); border-radius: 11px; padding: 3px; gap: 2px; }
  .seg-ctl.wide { display: flex; width: 100%; }
  .seg-ctl button { flex: 1; border: 0; background: transparent; color: var(--txt-mid); font-family: inherit; font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: background .2s, color .2s; }
  .seg-ctl button.on { background: var(--accent); color: #07080a; }
  body[data-theme="light"] .seg-ctl button.on { color: #fff; }

  /* ---------- KPI / charts ---------- */
  .card.kpi { padding: 14px 15px; display: flex; flex-direction: column; gap: 2px; }
  .trend-bar { transition: height .5s cubic-bezier(.2,.7,.3,1); }

  /* ---------- round buttons ---------- */
  .round-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--hair); background: var(--surface-2); display: grid; place-items: center; color: var(--txt-mid); cursor: pointer; flex: 0 0 auto; }
  .round-btn.lg { width: 48px; height: 48px; }
  .round-btn:active { transform: scale(.92); }

  /* ---------- fab stack ---------- */
  .fab-stack { position: absolute; right: 18px; bottom: 80px; display: flex; flex-direction: column; gap: 12px; z-index: 7; align-items: center; }
  .fab-stack .fab { position: static; }
  .fab-scan { width: 48px; height: 48px; background: var(--surface-2); color: var(--accent); border: 1px solid color-mix(in oklab, var(--accent) 40%, var(--hair)); box-shadow: 0 8px 22px -10px rgba(0,0,0,.6); }

  /* ---------- provider suggestion chips ---------- */
  .prov-chip { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--hair); border-radius: 22px; padding: 5px 12px 5px 5px; background: var(--surface-2); color: var(--txt-hi); font-family: inherit; font-size: 13px; cursor: pointer; white-space: nowrap; transition: border-color .15s, background .15s; }
  .prov-chip.sel { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 14%, var(--surface-2)); }
  .prov-chip:active { transform: scale(.97); }

  .detected-banner { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ok); background: color-mix(in oklab, var(--ok) 12%, transparent); border: 1px solid color-mix(in oklab, var(--ok) 35%, transparent); border-radius: 11px; padding: 9px 12px; }

  /* ---------- scan viewfinder ---------- */
  .scan-frame { position: relative; border-radius: 18px; background: radial-gradient(120% 90% at 50% 0, color-mix(in oklab, var(--accent) 10%, var(--surface-1)), var(--surface-1)); border: 1px solid var(--hair); height: 250px; overflow: hidden; display: grid; place-items: center; }
  .scan-doc { width: 62%; background: var(--surface-3); border-radius: 8px; padding: 18px 16px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 12px 30px -12px rgba(0,0,0,.5); transform: rotate(-2deg); }
  .scan-line-row { height: 7px; border-radius: 4px; background: color-mix(in oklab, var(--txt-low) 40%, transparent); }
  .scan-amt { font-size: 18px; font-weight: 700; color: var(--txt-mid); margin: 2px 0; }
  .scan-corner { position: absolute; width: 26px; height: 26px; border: 2.5px solid var(--accent); }
  .scan-corner.tl { top: 16px; left: 16px; border-right: 0; border-bottom: 0; border-radius: 8px 0 0 0; }
  .scan-corner.tr { top: 16px; right: 16px; border-left: 0; border-bottom: 0; border-radius: 0 8px 0 0; }
  .scan-corner.bl { bottom: 16px; left: 16px; border-right: 0; border-top: 0; border-radius: 0 0 0 8px; }
  .scan-corner.br { bottom: 16px; right: 16px; border-left: 0; border-top: 0; border-radius: 0 0 8px 0; }
  .scan-sweep { position: absolute; left: 8%; right: 8%; height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent); box-shadow: 0 0 18px 3px color-mix(in oklab, var(--accent) 70%, transparent); border-radius: 3px; animation: sweep 1.9s ease-in-out infinite; }
  @keyframes sweep { 0%{ top: 14%; } 50%{ top: 84%; } 100%{ top: 14%; } }
  .scan-check { position: absolute; inset: 0; display: grid; place-items: center; background: color-mix(in oklab, var(--ok) 20%, transparent); color: var(--ok); animation: vIn .3s ease; }

  /* live detect card (Brex) */
  .scan-frame.live { background: linear-gradient(180deg, #0b0d12, #15181f); border-color: rgba(255,255,255,.1); min-height: 340px; }
  .scan-frame.live .scan-doc { opacity: .5; }
  .scan-live-card { position: absolute; left: 12px; right: 12px; top: 12px; display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 14px; background: rgba(255,255,255,.95); color: #11131a; box-shadow: 0 12px 30px -12px rgba(0,0,0,.6); }
  .scan-live-card .low { color: #5b5f6b !important; }
  /* mini receipt thumbnail */
  .scan-receipt-thumb { width: 84px; flex: 0 0 auto; background: var(--surface-3); border-radius: 9px; padding: 12px 11px; display: flex; flex-direction: column; gap: 7px; box-shadow: 0 10px 24px -12px rgba(0,0,0,.5); transform: rotate(-2deg); }
  .scan-receipt-thumb.sm { width: 64px; padding: 10px 9px; gap: 5px; }
  .scan-receipt-thumb .rt-logo { width: 22px; height: 22px; border-radius: 6px; background: color-mix(in oklab, var(--accent) 45%, var(--surface-1)); margin-bottom: 2px; }
  .scan-receipt-thumb .rt-line { height: 5px; border-radius: 3px; background: color-mix(in oklab, var(--txt-low) 38%, transparent); }

  .det-input:focus, .det-select:focus { outline: none; }
  .det-select { cursor: pointer; }
  .link-btn { background: none; border: 0; color: var(--accent); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; padding: 5px 0 0; display: inline-flex; align-items: center; gap: 5px; }
  /* receipt rows (GoPay) */
  .rcpt-head { display: flex; gap: 14px; align-items: center; padding: 4px 0; }
  .rcpt-rows { display: flex; flex-direction: column; border: 1px solid var(--hair); border-radius: var(--r-md); overflow: hidden; background: var(--surface-2); }
  .rcpt-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 13px 15px; border-bottom: 1px solid var(--hair); }

  .rcpt-k { font-size: 13px; color: var(--txt-low); display: inline-flex; align-items: center; gap: 7px; }

  /* ===== devices showcase (widgets + watch) ===== */
  .dev-label { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--txt-low); margin: 0 0 11px; }
  .homescreen { border-radius: 26px; padding: 20px 18px 16px; background:
      radial-gradient(110% 70% at 20% 0, color-mix(in oklab, var(--accent) 26%, transparent), transparent 55%),

    border: 1px solid var(--hair); box-shadow: inset 0 1px 0 rgba(255,255,255,.05); }

  .watch-screen { flex: 1; border-radius: 32px; background: linear-gradient(170deg, #0a0c11, #14171e); display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 14px 13px; text-align: center; color: #f2f4f7; }

  .shutter { width: 64px; height: 64px; border-radius: 50%; border: 0; background: transparent; box-shadow: inset 0 0 0 4px var(--accent); display: grid; place-items: center; cursor: pointer; padding: 0; }

  /* ---------- appearance theme switch ---------- */
  .theme-switch { display: flex; gap: 10px; }
  .theme-switch button { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 9px; padding: 16px; border-radius: var(--r-md); border: 1px solid var(--hair); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); color: var(--txt-mid); font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: border-color .2s, color .2s, box-shadow .25s; }
  .theme-switch button.on { border-color: var(--accent); color: var(--txt-hi); box-shadow: 0 0 0 1px var(--accent), 0 10px 28px -14px color-mix(in oklab, var(--accent) 80%, transparent); }

  /* ---------- orb launcher + ask overlay ---------- */
  .orb-fab { position: absolute; right: 16px; bottom: 80px; width: 56px; height: 56px; border: 0; background: transparent; padding: 0; cursor: pointer; z-index: 12; display: grid; place-items: center; filter: drop-shadow(0 10px 20px color-mix(in oklab, var(--accent) 55%, transparent)); }

  .javatar { position: relative; display: inline-grid; place-items: center; flex: 0 0 auto; }
  .javatar-disc { position: relative; width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: radial-gradient(circle at 36% 26%, color-mix(in oklab, var(--pg1) 92%, #fff), var(--pg1) 40%, var(--pg2) 100%); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18), inset 0 -8px 18px rgba(0,0,0,0.22); z-index: 1; }
  .javatar-fig { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .javatar-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .javatar-halo { position: absolute; inset: -16%; border-radius: 50%; background: radial-gradient(circle, color-mix(in oklab, var(--pg1) 80%, transparent), transparent 66%); filter: blur(8px); opacity: calc(0.55 * var(--glow, 1)); z-index: 0; animation: breathe 5.5s ease-in-out infinite; }
  .javatar.speaking .javatar-halo { animation-duration: 1.6s; }

  .javatar-pulse.p2 { animation-delay: 1.05s; }
  .javatar-wave { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); display: flex; align-items: flex-end; gap: 13%; height: 26%; width: 52%; z-index: 2; }
  .javatar-wave i { flex: 1; background: #fff; border-radius: 4px; box-shadow: 0 0 8px color-mix(in oklab, var(--pg1) 80%, transparent); animation: wv .85s ease-in-out infinite; }
  .javatar-wave i:nth-child(2){animation-delay:.12s} .javatar-wave i:nth-child(3){animation-delay:.24s}
  .javatar-wave i:nth-child(4){animation-delay:.36s} .javatar-wave i:nth-child(5){animation-delay:.18s}
  .javatar-badge { position: absolute; right: -2px; bottom: -2px; width: 38%; height: 38%; min-width: 18px; min-height: 18px; border-radius: 50%; background: var(--accent); color: #07080a; display: grid; place-items: center; box-shadow: 0 0 0 2.5px var(--canvas); z-index: 3; }

  .avatar-fab { position: absolute; right: 16px; bottom: 80px; width: 58px; height: 58px; border: 0; background: transparent; padding: 0; cursor: pointer; z-index: 12; display: grid; place-items: center; filter: drop-shadow(0 12px 22px color-mix(in oklab, var(--accent) 50%, transparent)); }
  .avatar-fab:active { transform: scale(.92); }

  .judith-msg { display: flex; align-items: flex-end; gap: 8px; align-self: flex-start; max-width: 90%; }

  /* ---------- bills-list overlay (See all) ---------- */
  .sheet-screen { position: absolute; inset: 0; z-index: 20; background: var(--canvas); display: flex; flex-direction: column; transform: translateX(100%); transition: transform .34s cubic-bezier(.2,.8,.2,1); }

  .bl-filter-row { display: flex; align-items: center; gap: 10px; }
  .bl-flabel { font-size: 11px; color: var(--txt-low); text-transform: uppercase; letter-spacing: .05em; width: 64px; flex: 0 0 auto; }

  /* ---------- calendar ---------- */
  .cal-summary { display: flex; align-items: center; justify-content: space-between; }

  .cal-num { font-size: 11px; line-height: 1.3; }

  .cal-daychip-m { font-size: 9px; color: var(--txt-low); text-transform: uppercase; letter-spacing: .04em; }

  /* ===== stitched-flow additions ===== */
  .phase-anim { animation: vIn .4s cubic-bezier(.2,.7,.3,1); }
  .mic-btn { align-self: center; }
  .auth-divider { display: flex; align-items: center; gap: 10px; color: var(--txt-low); font-size: 12px; margin: 2px 0; }
  .auth-divider::before, .auth-divider::after { content: ""; flex: 1; height: 1px; background: var(--hair); }
  .auth-socials { display: flex; gap: 10px; }

  .auth-social:active { transform: scale(.96); }

  .auth-foot span { color: var(--accent); font-weight: 600; cursor: pointer; }
  /* ===== IntroShell: splash + login (Judith persists across both) ===== */
  .intro-screen { align-items: center; background:
      radial-gradient(95% 55% at 50% 38%, color-mix(in oklab, var(--accent) 22%, transparent), transparent 62%),
      var(--canvas);
    transition: background .5s ease; }
  .intro-screen.stage-splash { cursor: pointer; }

  /* the one persistent avatar — motion via one-shot animations (transitions
     are unreliable in this merged sheet), static values are the resting state */
  .intro-judith { position: absolute; left: 50%; z-index: 6; transform: translateX(-50%) scale(1); will-change: top, transform; }
  .intro-judith.is-splash { top: 256px; transform: translateX(-50%) scale(1); animation: jIn 1s cubic-bezier(.2,.8,.2,1) both; }
  .intro-judith.is-auth   { top: 92px;  transform: translateX(-50%) scale(0.7); animation: judToAuth .6s cubic-bezier(.4,0,.2,1) both; }
  @keyframes jIn { from { opacity: 0; transform: translateX(-50%) scale(.5); } to { opacity: 1; transform: translateX(-50%) scale(1); } }
  @keyframes judToAuth { from { top: 256px; transform: translateX(-50%) scale(1); } to { top: 92px; transform: translateX(-50%) scale(0.7); } }

  /* splash wordmark */
  .intro-word { position: absolute; top: 408px; left: 0; right: 0; text-align: center; z-index: 5; }
  .intro-word.gone { opacity: 0; transform: translateY(-26px); pointer-events: none; animation: wordOut .42s ease both; }
  @keyframes wordOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(-26px); } }
  .splash-word { font-size: 44px; font-weight: 600; letter-spacing: -0.02em; opacity: 0; animation: splashWord 1s ease .5s both; }
  .splash-tag { font-size: 15px; color: var(--txt-mid); margin-top: 0; opacity: 0; animation: splashWord .9s ease 1.05s both; }
  .splash-hl { color: var(--accent); font-weight: 800; display: inline-block; opacity: 0; transform-origin: center;
    animation: handledIn 1s cubic-bezier(.18,1.5,.4,1) 1.9s both, handledGlow 2.4s ease-in-out 3s infinite; }
  @keyframes splashWord { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: none; } }
  @keyframes handledIn { 0% { opacity: 0; transform: scale(2.6) translateZ(0); filter: blur(7px); } 45% { opacity: 1; } 65% { transform: scale(.9); filter: none; } 82% { transform: scale(1.08); } 100% { opacity: 1; transform: scale(1); filter: none; text-shadow: 0 0 26px color-mix(in oklab, var(--accent) 85%, transparent); } }
  @keyframes handledGlow { 0%,100% { text-shadow: 0 0 9px color-mix(in oklab, var(--accent) 35%, transparent); } 50% { text-shadow: 0 0 24px color-mix(in oklab, var(--accent) 90%, transparent), 0 0 44px color-mix(in oklab, var(--accent) 55%, transparent); } }
  .splash-foot { position: absolute; bottom: 34px; left: 0; right: 0; text-align: center; font-size: 12px; color: var(--txt-low); letter-spacing: .04em; opacity: 0; animation: splashWord .8s ease 2.8s both; z-index: 5; }

  .intro-auth { position: absolute; left: 0; right: 0; top: 0; bottom: 0; padding: 216px 26px 26px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    opacity: 0; transform: translateY(14px); pointer-events: none; }

  .g-badge { font-weight: 800; color: #4285F4; }

  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

  .spotlight-rings { position: absolute; left: 50%; top: 322px; transform: translate(-50%, -50%); }
  .spotlight-rings i { position: absolute; left: 50%; top: 50%; width: 150px; height: 150px; margin: -75px 0 0 -75px; border-radius: 50%; border: 1px solid color-mix(in oklab, var(--accent) 45%, transparent); animation: ringOut 3.4s ease-out infinite; }

  @keyframes ringOut { 0% { transform: scale(.5); opacity: .7; } 80% { opacity: 0; } 100% { transform: scale(2.4); opacity: 0; } }

  .bloom-bg { position: absolute; inset: 0; background:
      radial-gradient(40% 30% at 28% 32%, color-mix(in oklab, var(--accent) 30%, transparent), transparent 70%),
      radial-gradient(45% 32% at 74% 60%, color-mix(in oklab, oklch(0.78 0.15 330) 28%, transparent), transparent 70%),
      radial-gradient(40% 30% at 52% 78%, color-mix(in oklab, oklch(0.8 0.14 75) 26%, transparent), transparent 70%);
    filter: blur(6px); animation: bloomShift 7s ease-in-out infinite alternate; }
  @keyframes bloomShift { from { transform: scale(1) translateY(0); } to { transform: scale(1.12) translateY(-10px); } }

  .cf-wrap { position: absolute; inset: 0; overflow: hidden; }
  .cf { position: absolute; top: -8%; width: 9px; height: 13px; animation: cfFall linear infinite; }
  @keyframes cfFall { 0% { transform: translateY(-10px) rotate(0); opacity: 0; } 12% { opacity: 1; } 100% { transform: translateY(740px) rotate(540deg); opacity: .9; } }

  .fc-wrap { position: absolute; inset: 0; }
  .float-card { position: absolute; display: flex; align-items: center; gap: 9px; width: 190px; padding: 11px 13px; border-radius: 16px;
    background: linear-gradient(155deg, color-mix(in oklab, var(--surface-2) 80%, transparent), color-mix(in oklab, var(--surface-1) 72%, transparent));
    border: 1px solid color-mix(in oklab, #fff 14%, transparent);
    box-shadow: 0 18px 44px -18px rgba(0,0,0,.85), 0 0 22px -6px color-mix(in oklab, var(--accent) 38%, transparent), inset 0 1px 0 rgba(255,255,255,0.07);
    backdrop-filter: blur(9px) saturate(1.2); -webkit-backdrop-filter: blur(9px) saturate(1.2);
    animation: floatY 5s ease-in-out infinite, cardGlow 4.4s ease-in-out infinite; }

  .voice-play.live::after { animation-delay: .75s; }
  @keyframes vpRing { 0% { transform: scale(1); opacity: .7; } 100% { transform: scale(2.4); opacity: 0; } }
  .judith-line.is-hint { animation: hintBreath 2.4s ease-in-out infinite; }
  @keyframes hintBreath { 0%,100% { opacity: .7; } 50% { opacity: 1; box-shadow: 0 0 0 0 transparent; } }
  .javatar.speaking .javatar-disc { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18), inset 0 -8px 18px rgba(0,0,0,0.22), 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent); }
  .javatar.speaking::after { content: ""; position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid color-mix(in oklab, var(--accent) 55%, transparent); animation: vpRing 1.6s ease-out infinite; }
  body.reduce-motion .voice-play.live::before, body.reduce-motion .voice-play.live::after, body.reduce-motion .judith-line.is-hint, body.reduce-motion .javatar.speaking::after { animation: none !important; }

  /* ===== Step 3 per-persona avatar treatments ===== */
  .pavatar { position: relative; display: inline-grid; place-items: center; flex: 0 0 auto; }
  .pavatar .javatar { width: 100% !important; height: 100% !important; }
  .pv-ring { position: absolute; inset: -5px; border-radius: 50%; padding: 2.5px; background: linear-gradient(140deg, var(--pa1), var(--pa2)); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude; box-shadow: 0 0 16px -3px var(--pa1); pointer-events: none; }
  .pv-clip { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; pointer-events: none; }
  .pv-collar { position: absolute; left: 0; right: 0; bottom: 0; height: 40%; background: linear-gradient(to top, var(--pa1), transparent); opacity: .6; mix-blend-mode: screen; }
  .pv-badge { position: absolute; bottom: -3px; right: -3px; width: 42%; height: 42%; min-width: 18px; min-height: 18px; border-radius: 50%; display: grid; place-items: center; color: #07080a; background: linear-gradient(140deg, var(--pa1), var(--pa2)); box-shadow: 0 0 0 2.5px var(--canvas); }

  /* ===== late-fee hook screen ===== */
  .lf-stat { font-size: 52px; font-weight: 700; letter-spacing: -0.03em; margin-top: 22px; line-height: 1; color: var(--urgent); text-shadow: 0 0 30px color-mix(in oklab, var(--urgent) 45%, transparent); }
  .lf-notif { display: flex; align-items: center; gap: 11px; width: 100%; max-width: 300px; padding: 13px 15px; border-radius: 16px; margin-bottom: 22px;
    background: color-mix(in oklab, var(--urgent) 12%, var(--surface-2)); border: 1px solid color-mix(in oklab, var(--urgent) 40%, transparent);
    box-shadow: 0 14px 34px -16px rgba(0,0,0,.8); animation: lfDrop .6s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes lfDrop { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: none; } }
  .lf-notif-ico { width: 34px; height: 34px; flex: 0 0 auto; border-radius: 10px; display: grid; place-items: center; color: var(--urgent); background: color-mix(in oklab, var(--urgent) 18%, transparent); border: 1px solid color-mix(in oklab, var(--urgent) 40%, transparent); }
  .lf-notif-amt { font-weight: 700; color: var(--urgent); font-size: 15px; }
  body.reduce-motion .lf-notif { animation: none !important; }
  .lf-hot { color: var(--urgent); text-decoration: underline; text-decoration-color: color-mix(in oklab, var(--urgent) 70%, transparent); text-underline-offset: 4px; text-decoration-thickness: 2px; }

  /* ===== dramatic "failure" transition ===== */
  .fault-wrap { background: transparent !important; pointer-events: none; animation: faultShake .5s cubic-bezier(.36,.07,.19,.97) 2; }
  .fault-flash { position: absolute; inset: 0; background: radial-gradient(120% 80% at 50% 50%, color-mix(in oklab, var(--urgent) 55%, transparent), transparent 70%), var(--canvas); opacity: 0; animation: faultFlash 1.25s ease forwards; }
  .fault-bar { position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: var(--urgent); box-shadow: 0 0 18px 4px color-mix(in oklab, var(--urgent) 80%, transparent); transform: scaleX(0); opacity: 0; animation: faultBar 1.25s ease forwards; }
  @keyframes faultShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-9px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-6px); } 80% { transform: translateX(4px); } }
  @keyframes faultFlash { 0% { opacity: 0; } 12% { opacity: 1; } 22% { opacity: .55; } 32% { opacity: .95; } 55% { opacity: .9; } 100% { opacity: 0; } }
  @keyframes faultBar { 0% { transform: scaleX(0); opacity: 0; } 14% { transform: scaleX(1); opacity: 1; } 55% { opacity: 1; } 100% { transform: scaleX(1.04); opacity: 0; } }
  body.reduce-motion .fault-wrap, body.reduce-motion .fault-flash, body.reduce-motion .fault-bar { animation: none !important; opacity: 0 !important; }

  /* ===== problem: unknown total ===== */
  .mystery-card { width: 100%; max-width: 300px; margin: 22px 0; text-align: center; padding: 22px 18px; }
  .mystery-total { font-size: 46px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; margin-top: 4px; }
  .mystery-digits { color: var(--txt-low); filter: blur(1px); }
  .mystery-rows { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
  .mystery-row { display: flex; align-items: center; gap: 10px; text-align: left; }
  .mystery-blur { color: var(--txt-low); filter: blur(3px); letter-spacing: 1px; user-select: none; }

  /* ===== stakes (keep going this way) ===== */
  .stakes-proj { width: 100%; max-width: 290px; display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 6px; }
  .stakes-row { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 12px 15px; border-radius: 14px; background: var(--surface-2); border: 1px solid var(--hair); font-size: 14px; }
  .stakes-row.big { font-size: 16px; font-weight: 600; border-color: color-mix(in oklab, var(--urgent) 45%, transparent); background: color-mix(in oklab, var(--urgent) 10%, var(--surface-2)); }
  .stakes-arrow { color: var(--urgent); opacity: .8; }
  .btn.sel-yes, .btn.sel-no { filter: brightness(1.1); }

  /* ===== rise (turning point) transition ===== */
  .rise-wrap { background: transparent !important; pointer-events: none; overflow: hidden; }
  .rise-bloom { position: absolute; left: 50%; bottom: -40%; width: 160%; aspect-ratio: 1; transform: translateX(-50%); border-radius: 50%;
    background: radial-gradient(circle, color-mix(in oklab, var(--accent) 60%, #fff) 0%, var(--accent) 30%, color-mix(in oklab, var(--accent) 40%, transparent) 55%, transparent 72%);
    animation: riseUp 1.15s cubic-bezier(.5,0,.2,1) forwards; }
  @keyframes riseUp { 0% { transform: translateX(-50%) translateY(20%) scale(.2); opacity: 0; } 35% { opacity: 1; } 60% { transform: translateX(-50%) translateY(-30%) scale(1.1); opacity: 1; } 100% { transform: translateX(-50%) translateY(-60%) scale(1.6); opacity: 0; } }
  body.reduce-motion .rise-bloom { animation: none !important; opacity: 0 !important; }

  /* ===== question-mark transition ===== */
  .qm-wrap { background: transparent !important; pointer-events: none; overflow: hidden; }
  .qm-veil { position: absolute; inset: 0; background: var(--canvas); opacity: 0; animation: qmVeil 1.25s ease forwards; }
  @keyframes qmVeil { 0% { opacity: 0; } 25% { opacity: .92; } 75% { opacity: .92; } 100% { opacity: 0; } }
  .qm { position: absolute; bottom: -10%; color: var(--accent); font-weight: 700; font-family: 'Space Grotesk', sans-serif; opacity: 0; text-shadow: 0 0 18px color-mix(in oklab, var(--accent) 70%, transparent); animation-name: qmRise; animation-timing-function: cubic-bezier(.4,0,.4,1); animation-fill-mode: forwards; }
  @keyframes qmRise { 0% { transform: translateY(0) rotate(-8deg); opacity: 0; } 20% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-860px) rotate(10deg); opacity: 0; } }
  body.reduce-motion .qm, body.reduce-motion .qm-veil { animation: none !important; opacity: 0 !important; }

  /* ===== fork (stakes) left/right split ===== */
  .fork-split { display: flex; align-items: stretch; gap: 0; width: 100%; max-width: 320px; margin: 26px 0; }
  .fork-side { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 18px 12px; border-radius: 18px; border: 1px solid var(--hair); background: var(--surface-2); }
  .fork-side .ico { width: 38px; height: 38px; }
  .fork-side.bad { background: color-mix(in oklab, var(--urgent) 10%, var(--surface-2)); border-color: color-mix(in oklab, var(--urgent) 35%, transparent); }
  .fork-side.good { background: color-mix(in oklab, var(--ok) 10%, var(--surface-2)); border-color: color-mix(in oklab, var(--ok) 38%, transparent); }
  .fork-label { font-size: 12px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; color: var(--txt-mid); }
  .fork-amt { font-size: 22px; font-weight: 700; color: var(--urgent); }
  .fork-sub { font-size: 11px; color: var(--txt-low); }
  .fork-or { align-self: center; font-size: 12px; color: var(--txt-low); padding: 0 10px; font-style: italic; }
  .fork-face { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--hair-2); }
  .fork-face.anx { color: var(--urgent); }
  .fork-face.calm { color: var(--ok); }
  .fork-mood { font-size: 11px; color: var(--txt-mid); margin-top: 5px; }

  /* ===== COMMIT moment transition ===== */
  .commit-wrap { background: radial-gradient(90% 60% at 50% 45%, color-mix(in oklab, var(--accent) 16%, transparent), transparent 65%), var(--canvas) !important; pointer-events: none; }
  .commit-stage { position: absolute; inset: 0; display: grid; place-items: center; perspective: 1100px; }

  /* the persisting "Start today" box (mirrors the fork good-side) */
  .commit-box { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 190px; padding: 26px 18px; border-radius: 22px;
    background: color-mix(in oklab, var(--ok) 12%, var(--surface-2)); border: 1px solid color-mix(in oklab, var(--ok) 45%, transparent);
    box-shadow: 0 0 0 6px color-mix(in oklab, var(--ok) 12%, transparent), 0 24px 60px -18px color-mix(in oklab, var(--ok) 70%, transparent); }
  .commit-box-label { font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--txt-mid); }
  .commit-box-ico { width: 46px; height: 46px; }
  .commit-box-amt { font-size: 30px; font-weight: 700; color: var(--ok); }
  .commit-box-sub { font-size: 12px; color: var(--txt-low); }

  .commit-card { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; padding: 0 28px; opacity: 0; }
  .commit-you { display: block; font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 800; font-size: 64px; line-height: 1; color: var(--ok); text-shadow: 0 0 34px color-mix(in oklab, var(--ok) 50%, transparent); margin-bottom: 6px; }
  .commit-line { font-size: 20px; font-weight: 500; color: var(--txt-mid); }
  .commit-control { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 800; font-size: 60px; line-height: 1.04; color: var(--txt-hi); text-shadow: 0 0 32px color-mix(in oklab, var(--accent) 45%, transparent); }
  .commit-today { position: relative; font-size: 32px; font-weight: 700; letter-spacing: -0.01em; color: var(--accent); margin-top: 4px; }
  .commit-uline { position: absolute; left: 0; right: 0; bottom: -5px; height: 3px; border-radius: 3px; background: var(--accent); box-shadow: 0 0 12px var(--accent); transform: scaleX(0); transform-origin: left; }

  /* box zoom-in + persist */
  .commit-box { animation: commitBoxIn .8s cubic-bezier(.2,.9,.3,1.15) both; }
  @keyframes commitBoxIn { 0% { transform: scale(.25); opacity: 0; } 55% { opacity: 1; } 78% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  .commit-wrap.ph-card .commit-card { opacity: 1; }

  /* FLIP variant — box flips out, card flips in */
  .commit-flip .commit-stage { transform-style: preserve-3d; }
  .commit-flip.ph-card .commit-box { animation: flipBoxOut .55s cubic-bezier(.5,0,.5,1) forwards; }
  @keyframes flipBoxOut { to { transform: rotateY(90deg) scale(1.05); opacity: 0; } }
  .commit-flip.ph-card .commit-card { animation: flipCardIn .6s cubic-bezier(.2,.8,.2,1) .35s both; }
  @keyframes flipCardIn { 0% { transform: rotateY(-90deg); opacity: 0; } 100% { transform: rotateY(0); opacity: 1; } }

  /* ZOOM variant — box scales through, card scales up */
  .commit-zoom.ph-card .commit-box { animation: zoomBoxOut .5s ease forwards; }
  @keyframes zoomBoxOut { to { transform: scale(3.2); opacity: 0; filter: blur(7px); } }
  .commit-zoom.ph-card .commit-card { animation: zoomCardIn .7s cubic-bezier(.2,.8,.2,1) .25s both; }
  @keyframes zoomCardIn { 0% { transform: scale(.55); opacity: 0; filter: blur(4px); } 100% { transform: scale(1); opacity: 1; filter: none; } }

  /* staggered word emphasis once the card is in — paced with pauses */
  .commit-wrap.ph-card .commit-you { animation: commitYouIn .7s cubic-bezier(.2,.9,.3,1.3) .5s both; }
  @keyframes commitYouIn { 0% { transform: scale(0) rotate(-6deg); opacity: 0; } 55% { transform: scale(1.25); opacity: 1; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
  .commit-wrap.ph-card .commit-line { animation: commitFadeUp .5s ease 1.7s both; }
  .commit-wrap.ph-card .commit-control { animation: commitCtrlIn .5s ease 2.3s both, commitShake .7s cubic-bezier(.36,.07,.19,.97) 2.85s both; }
  @keyframes commitCtrlIn { 0% { opacity: 0; transform: translateY(14px) scale(.9); filter: blur(3px); } 100% { opacity: 1; transform: none; filter: none; } }
  @keyframes commitShake { 0%,100% { transform: translateX(0) rotate(0); } 14% { transform: translateX(-8px) rotate(-2deg); } 28% { transform: translateX(7px) rotate(2deg); } 42% { transform: translateX(-6px) rotate(-1.5deg); } 56% { transform: translateX(5px) rotate(1deg); } 70% { transform: translateX(-3px); } 84% { transform: translateX(2px); } }
  .commit-wrap.ph-card .commit-today { animation: commitFadeUp .5s ease 3.9s both; }
  .commit-wrap.ph-card .commit-uline { animation: commitUline .6s cubic-bezier(.6,0,.3,1) 4.5s both; }
  @keyframes commitFadeUp { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: none; } }
  @keyframes commitUline { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }

  body.reduce-motion .commit-box, body.reduce-motion .commit-card, body.reduce-motion .commit-card * { animation: none !important; }
  body.reduce-motion .commit-wrap .commit-card { opacity: 1 !important; }
  body.reduce-motion .commit-wrap .commit-box { opacity: 0 !important; }
  body.reduce-motion .commit-uline { transform: scaleX(1) !important; }

  /* ===== set-expectations / save-point screen ===== */
  .exp-time { display: flex; align-items: center; gap: 13px; width: 100%; max-width: 300px; margin: 22px 0 12px; padding: 14px 16px; border-radius: 16px; background: var(--surface-2); border: 1px solid var(--hair); }
  .exp-save { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--ok); background: color-mix(in oklab, var(--ok) 11%, transparent); border: 1px solid color-mix(in oklab, var(--ok) 32%, transparent); border-radius: 12px; padding: 9px 13px; max-width: 300px; text-align: left; line-height: 1.35; }

  /* ===== voice add-bill (Judith-led) ===== */
  .va-steps { display: flex; align-items: center; gap: 5px; margin-top: 10px; }
  .va-steps i { width: 22px; height: 4px; border-radius: 3px; background: var(--surface-3); }
  .va-steps i.done { background: var(--ok); }
  .va-steps i.now { background: var(--accent); box-shadow: 0 0 10px color-mix(in oklab,var(--accent) 70%,transparent); }
  .va-judith { display: flex; align-items: flex-start; gap: 10px; }
  .va-judith .judith-line { flex: 1; }
  .va-done { display: flex; flex-direction: column; align-items: center; text-align: center; }
  .va-formhead { display: flex; align-items: center; gap: 12px; }
  .kind-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .kind-dot.fix { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .kind-dot.var { background: var(--near); box-shadow: 0 0 8px var(--near); }
  .va-ask { margin-top: 14px; padding: 13px 16px; border-radius: 14px; border: 1px dashed color-mix(in oklab, var(--accent) 45%, var(--hair)); background: color-mix(in oklab, var(--accent) 7%, transparent); max-width: 300px; }
  .count-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-top: 16px; }
  .count-chip { padding: 16px 0; border-radius: 14px; border: 1px solid var(--hair); background: linear-gradient(160deg, var(--surface-2), var(--surface-1)); color: var(--txt-hi); font-family: inherit; font-size: 18px; font-weight: 600; cursor: pointer; transition: border-color .15s, transform .12s; }
  .count-chip:active { transform: scale(.96); }
  .count-chip:hover { border-color: color-mix(in oklab, var(--accent) 50%, var(--hair)); }
</style>
