<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Judith — Add Bills (Hi-fi)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: oklch(0.74 0.16 295);
    --glow: 1;

    --canvas: #0a0b0e;
    --surface-1: #121419;
    --surface-2: #181b22;
    --surface-3: #1f232c;
    --hair: rgba(255,255,255,0.09);
    --hair-2: rgba(255,255,255,0.06);
    --txt-hi: #f3f5f8;
    --txt-mid: #a7adba;
    --txt-low: #6a7180;

    --urgent: oklch(0.7 0.18 25);
    --near: oklch(0.8 0.15 75);
    --ok: oklch(0.78 0.13 165);

    --r-lg: 24px;
    --r-md: 16px;
    --r-sm: 12px;
    --pad: 18px;
    --gap: 12px;
  }
  body[data-density="compact"] { --pad: 13px; --gap: 9px; }
  body[data-density="comfy"]  { --pad: 22px; --gap: 15px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 80% at 50% -10%, color-mix(in oklab, var(--accent) 11%, transparent), transparent 60%),
      radial-gradient(100% 70% at 50% 120%, rgba(255,255,255,0.03), transparent 55%),
      #050608;
    color: var(--txt-hi);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: grid;
    place-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

  /* ---------- device ---------- */
  .phone {
    width: 390px;
    border-radius: 54px;
    padding: 11px;
    background: linear-gradient(160deg, #26282e, #0d0e11);
    box-shadow: 0 40px 90px -30px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05) inset;
  }
  .screen {
    position: relative;
    width: 368px;
    height: 800px;
    border-radius: 44px;
    background:
      radial-gradient(140% 60% at 50% -8%, color-mix(in oklab, var(--accent) 13%, transparent), transparent 55%),
      var(--canvas);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    color: var(--txt-hi);
  }

  .statusbar {
    flex: 0 0 auto;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 26px 6px;
    font-size: 14px; font-weight: 600;
  }
  .statusbar .ico-row { display: flex; gap: 6px; align-items: center; opacity: 0.92; }
  .statusbar .bars { display: flex; gap: 2px; align-items: flex-end; height: 11px; }
  .statusbar .bars i { width: 3px; background: var(--txt-hi); border-radius: 1px; }
  .statusbar .bars i:nth-child(1){height:4px} .statusbar .bars i:nth-child(2){height:6px}
  .statusbar .bars i:nth-child(3){height:8px} .statusbar .bars i:nth-child(4){height:11px}
  .batt { width: 22px; height: 11px; border: 1.5px solid var(--txt-hi); border-radius: 3px; position: relative; opacity:.9; }
  .batt::after { content:''; position:absolute; right:-3px; top:3px; width:2px; height:5px; background:var(--txt-hi); border-radius:0 2px 2px 0; }
  .batt::before { content:''; position:absolute; inset:1.5px; right:7px; background:var(--txt-hi); border-radius:1px; }

  .nav {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 12px;
    padding: 6px 22px 2px;
  }
  .iconbtn {
    width: 34px; height: 34px; flex:0 0 auto;
    border-radius: 50%;
    border: 1px solid var(--hair);
    background: var(--surface-2);
    display: grid; place-items: center;
    font-size: 17px; color: var(--txt-mid);
  }
  .progress { flex: 1; display: flex; gap: 6px; }
  .progress i { height: 4px; flex: 1; border-radius: 4px; background: var(--surface-3); }
  .progress i.done { background: var(--txt-low); }
  .progress i.now { background: var(--accent); box-shadow: 0 0 12px color-mix(in oklab, var(--accent) 70%, transparent); }
  .skip { font-size: 14px; color: var(--txt-low); }

  /* ---------- scroll body ---------- */
  .scroll {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 14px 22px 28px;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 18px, #000 calc(100% - 24px), transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0, #000 18px, #000 calc(100% - 24px), transparent 100%);
  }
  .scroll::-webkit-scrollbar { width: 0; }

  /* ---------- orb (companion / idle) ---------- */
  .head { display: flex; gap: 14px; align-items: center; margin-bottom: 22px; }
  .orb-wrap { position: relative; width: 56px; height: 56px; flex: 0 0 auto; }
  .orb-glow {
    position: absolute; inset: -14px; border-radius: 50%;
    background: radial-gradient(circle, color-mix(in oklab, var(--accent) 85%, transparent) 0%, transparent 65%);
    filter: blur(10px);
    opacity: calc(0.55 * var(--glow));
    animation: breathe 5.5s ease-in-out infinite;
  }
  .orb {
    position: absolute; inset: 8px; border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #fff 0%, color-mix(in oklab, var(--accent) 60%, #fff) 18%, var(--accent) 45%, color-mix(in oklab, var(--accent) 55%, #000) 100%);
    box-shadow:
      0 0 calc(18px * var(--glow)) color-mix(in oklab, var(--accent) 70%, transparent),
      inset 0 0 10px rgba(255,255,255,0.35);
    animation: breathe 5.5s ease-in-out infinite;
  }
  .orb::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.4), transparent 40%);
    mix-blend-mode: screen; opacity: 0.5;
    animation: spin 7s linear infinite;
  }
  .ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid color-mix(in oklab, var(--accent) 50%, transparent);
    animation: idlePulse 5.5s ease-out infinite;
  }
  .ring.r2 { animation-delay: 2.75s; }
  @keyframes breathe { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.06); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes idlePulse {
    0% { transform: scale(0.9); opacity: 0.7; }
    70% { opacity: 0; }
    100% { transform: scale(1.7); opacity: 0; }
  }
  .htext .kicker { font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 3px; }
  .htext .t { font-size: 22px; font-weight: 600; line-height: 1.12; letter-spacing: -0.01em; }
  .htext .s { font-size: 14px; color: var(--txt-mid); margin-top: 5px; line-height: 1.25; }

  /* ---------- category grid ---------- */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
  .tile {
    position: relative;
    border: 1px solid var(--hair);
    border-radius: var(--r-md);
    background: linear-gradient(160deg, var(--surface-2), var(--surface-1));
    padding: var(--pad);
    min-height: 96px;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer;
    transition: transform .18s ease, border-color .2s ease, box-shadow .25s ease;
    opacity: 0; transform: translateY(10px);
    animation: rise .5s cubic-bezier(.2,.7,.3,1) forwards;
  }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .tile:active { transform: scale(0.975); }
  .tile.sel {
    border-color: color-mix(in oklab, var(--accent) 60%, transparent);
    background:
      radial-gradient(120% 90% at 20% 0%, color-mix(in oklab, var(--accent) 16%, transparent), transparent 60%),
      linear-gradient(160deg, var(--surface-2), var(--surface-1));
    box-shadow: 0 0 0 1px color-mix(in oklab, var(--accent) 40%, transparent), 0 10px 30px -14px color-mix(in oklab, var(--accent) 80%, transparent);
  }
  .tile .ico {
    width: 34px; height: 34px; border-radius: 10px;
    border: 1px solid var(--hair);
    background: var(--surface-3);
    display: grid; place-items: center;
    color: var(--txt-mid);
  }
  .tile.sel .ico { color: var(--accent); border-color: color-mix(in oklab, var(--accent) 45%, transparent); background: color-mix(in oklab, var(--accent) 12%, var(--surface-3)); }
  .tile .lbl { font-size: 15px; font-weight: 500; }
  .tile .sub { font-size: 12px; color: var(--txt-low); margin-top: 2px; }
  .tile.sel .sub { color: color-mix(in oklab, var(--accent) 70%, var(--txt-mid)); }
  .badge {
    position: absolute; top: 12px; right: 12px;
    min-width: 22px; height: 22px; padding: 0 6px;
    border-radius: 20px;
    background: var(--accent); color: #07080a;
    font-size: 12px; font-weight: 700;
    display: grid; place-items: center;
    box-shadow: 0 0 14px color-mix(in oklab, var(--accent) 60%, transparent);
  }
  .tile.add {
    border-style: dashed; border-color: var(--hair);
    background: transparent;
    align-items: flex-start; justify-content: center; gap: 8px;
    color: var(--txt-mid);
  }
  .tile.add .ico { border-style: dashed; background: transparent; }

  .scrollcue { text-align: center; color: var(--txt-low); font-size: 12px; margin-top: 16px; letter-spacing: .04em; }

  /* ---------- bottom sheet ---------- */
  .scrim { position: absolute; inset: 0; background: rgba(3,4,6,0.55); backdrop-filter: blur(2px); z-index: 8; opacity: 0; pointer-events: none; transition: opacity .3s ease; }
  .scrim.show { opacity: 1; pointer-events: auto; }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 9;
    background: linear-gradient(180deg, var(--surface-2), var(--surface-1));
    border-top: 1px solid var(--hair);
    border-radius: 28px 28px 0 0;
    padding: 12px 22px calc(22px + env(safe-area-inset-bottom));
    box-shadow: 0 -30px 60px -20px rgba(0,0,0,0.8);
    transform: translateY(102%);
    transition: transform .42s cubic-bezier(.2,.8,.2,1);
    display: flex; flex-direction: column; gap: 14px;
  }
  .sheet.show { transform: none; }
  .grab { width: 42px; height: 5px; border-radius: 3px; background: var(--surface-3); margin: 2px auto 4px; }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; }
  .sheet-head .title { font-size: 19px; font-weight: 600; display: flex; align-items: center; gap: 9px; }
  .ctx-pill {
    font-size: 12px; font-weight: 600;
    color: var(--accent);
    border: 1px solid color-mix(in oklab, var(--accent) 45%, transparent);
    background: color-mix(in oklab, var(--accent) 12%, transparent);
    border-radius: 20px; padding: 3px 10px;
  }
  .sheet-head .close { color: var(--txt-low); font-size: 20px; cursor: pointer; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field > label { font-size: 12px; color: var(--txt-mid); letter-spacing: .02em; }
  .control {
    border: 1px solid var(--hair);
    background: var(--surface-1);
    border-radius: var(--r-sm);
    padding: 12px 14px;
    font-size: 15px;
    display: flex; align-items: center; justify-content: space-between;
    color: var(--txt-hi);
    transition: border-color .2s ease;
  }
  .control.placeholder { color: var(--txt-low); }
  .control:focus-within, .control.active { border-color: color-mix(in oklab, var(--accent) 55%, transparent); }
  .control .chev { color: var(--txt-low); }
  .amount-control { gap: 10px; }
  .amount-control .peso { color: var(--accent); font-weight: 700; font-size: 18px; }
  .amount-control .val { font-size: 20px; font-weight: 600; flex: 1; }
  .two { display: grid; grid-template-columns: 1.1fr 1fr; gap: 12px; }

  .due-preview { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--txt-mid); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.near { background: var(--near); box-shadow: 0 0 10px var(--near); }

  .save {
    margin-top: 4px;
    border: 0; cursor: pointer;
    background: var(--accent); color: #07080a;
    border-radius: var(--r-md);
    padding: 15px; font-size: 16px; font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    box-shadow: 0 10px 30px -10px color-mix(in oklab, var(--accent) 85%, transparent);
    transition: transform .15s ease, filter .2s ease;
  }
  .save:active { transform: scale(.985); filter: brightness(1.05); }

  .homebar { position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%); width: 130px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.28); z-index: 10; }

  body.reduce-motion * { animation: none !important; }
  body.reduce-motion .tile { opacity: 1; transform: none; }

  /* caption under device */
  .caption { margin-top: 22px; text-align: center; color: var(--txt-low); font-size: 13px; letter-spacing: .02em; }
  .caption b { color: var(--txt-mid); font-weight: 500; }
</style>
</head>
<body data-density="regular">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="add-bills-app.jsx"></script>
</body>
</html>
